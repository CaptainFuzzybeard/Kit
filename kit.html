<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F9F4EB;
  --cream-warm: #FDF8EF;
  --paper: #FFFDF7;
  --ink: #2B2420;
  --ink-soft: #6B5848;
  --ink-fade: #A59584;
  --rust: #A85620;
  --rust-bright: #C1520A;
  --umber: #B7976E;
  --umber-soft: #D8C8A8;
  --shadow: rgba(70, 30, 10, 0.12);
  --shadow-strong: rgba(70, 30, 10, 0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Source Serif Pro', Georgia, serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.04;
  background-image: 
    radial-gradient(circle at 25% 25%, rgba(70,30,10,0.3) 1px, transparent 1px),
    radial-gradient(circle at 75% 75%, rgba(70,30,10,0.3) 1px, transparent 1px);
  background-size: 4px 4px;
  z-index: 1;
}

.stage {
  position: fixed;
  inset: 0;
  z-index: 2;
}

/* ============ KIT — positioned in bottom-right ============ */
.kit-container {
  position: fixed;
  bottom: 8%;
  right: 6%;
  cursor: pointer;
  transition: transform 0.4s ease;
  z-index: 10;
  user-select: none;
}

.kit-container:hover {
  transform: translateY(-3px);
}

.kit-img {
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  width: 200px;
  height: auto;
  display: block;
  filter: drop-shadow(0 5px 10px var(--shadow));
  transition: transform 0.3s ease;
}

.kit-shadow {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
  height: 8px;
  background: radial-gradient(ellipse at center, rgba(70,30,10,0.22) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* Hint text below Kit */
.kit-hint {
  position: fixed;
  bottom: 4%;
  right: 6%;
  color: var(--ink-soft);
  font-style: italic;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.8s ease;
  z-index: 9;
  pointer-events: none;
  text-align: center;
  width: 200px;
}
.kit-hint.visible { opacity: 0.6; }

/* ============ SPEECH BUBBLE — above Kit, with tail ============ */

.bubble-container {
  position: fixed;
  /* Anchored to bottom-right above Kit */
  bottom: calc(8% + 220px);  /* Above Kit's head */
  right: calc(6% + 40px);    /* Slightly left of Kit's body */
  width: 360px;
  max-width: calc(100vw - 40px);
  /* Height is adaptive — grows with content, capped by viewport */
  min-height: 180px;
  max-height: calc(100vh - 280px);
  height: auto;
  background: var(--paper);
  border: 1px solid var(--umber-soft);
  border-radius: 16px;
  box-shadow: 
    0 8px 24px var(--shadow-strong),
    0 3px 8px var(--shadow);
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85) translateY(20px);
  transform-origin: bottom right;
  transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.35s ease;
  z-index: 20;
  overflow: hidden;
}

.bubble-container.open {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1) translateY(0);
}

/* Speech bubble tail — a triangular notch pointing down-right to Kit */
.bubble-container::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 28px;
  width: 22px;
  height: 22px;
  background: var(--paper);
  border-right: 1px solid var(--umber-soft);
  border-bottom: 1px solid var(--umber-soft);
  transform: rotate(45deg);
  border-bottom-right-radius: 3px;
}

/* Paper grain on bubble */
.bubble-container::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.03;
  background-image: 
    radial-gradient(circle at 30% 30%, rgba(70,30,10,0.5) 1px, transparent 1px),
    radial-gradient(circle at 70% 70%, rgba(70,30,10,0.4) 1px, transparent 1.5px);
  background-size: 5px 5px, 7px 7px;
}

/* ============ HEADER ============ */
.bubble-header {
  padding: 11px 18px 8px;
  border-bottom: 1px solid rgba(183, 151, 110, 0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 38px;
  flex-shrink: 0;
}
.story-title {
  font-size: 12px;
  font-style: italic;
  color: var(--ink-fade);
  letter-spacing: 0.02em;
}
.header-actions {
  display: flex;
  gap: 6px;
}
.header-btn {
  background: none;
  border: none;
  color: var(--ink-fade);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: 3px;
  font-family: inherit;
  transition: color 0.2s, background 0.2s;
}
.header-btn:hover { color: var(--ink-soft); background: rgba(183, 151, 110, 0.1); }

/* ============ CONTENT ============ */
.bubble-content {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px 28px;
  position: relative;
  cursor: default;
}
.bubble-content.advance-ready { cursor: pointer; }
.bubble-content.advance-ready:hover {
  background: linear-gradient(to bottom, rgba(255,253,247,0) 0%, rgba(255,252,240,0.4) 100%);
}
.bubble-content::-webkit-scrollbar { width: 5px; }
.bubble-content::-webkit-scrollbar-track { background: transparent; }
.bubble-content::-webkit-scrollbar-thumb { 
  background: rgba(183, 151, 110, 0.2); 
  border-radius: 3px; 
}

.block {
  margin-bottom: 1.3em;
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink);
  opacity: 0;
  transform: translateY(4px);
  animation: blockFadeIn 0.45s ease forwards;
}
@keyframes blockFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.block.dialogue .character-name {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 12px;
  margin-bottom: 3px;
  display: block;
  letter-spacing: 0.03em;
}
.block.dialogue .dialogue-text {
  color: var(--ink);
  padding-left: 12px;
  border-left: 2px solid var(--umber-soft);
}
.block.pause { height: 16px; margin: 0.3em 0; }
.block.pause.weight-2 { height: 26px; }
.block.pause.weight-3 { height: 40px; }

/* ============ STORY PICKER ============ */
.story-picker {
  padding: 8px 4px;
  animation: blockFadeIn 0.6s ease forwards;
}
.picker-intro {
  color: var(--ink-soft);
  font-style: italic;
  font-size: 14px;
  margin-bottom: 18px;
  text-align: center;
  line-height: 1.5;
}
.story-card {
  background: rgba(255, 252, 246, 0.8);
  border: 1px solid var(--umber-soft);
  border-radius: 7px;
  padding: 14px 15px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.story-card:hover {
  border-color: var(--rust);
  background: var(--cream-warm);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(70, 30, 10, 0.08);
}
.story-card-title {
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 4px;
  font-weight: 400;
}
.story-card-subtitle {
  font-size: 11px;
  color: var(--ink-fade);
  font-style: italic;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.story-card-description {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
}
.story-card.in-progress::after {
  content: "• beginning only";
  display: block;
  margin-top: 6px;
  font-size: 10px;
  color: var(--ink-fade);
  font-style: italic;
}

/* ============ RECAP ============ */
.recap-header {
  color: var(--ink-fade);
  font-style: italic;
  font-size: 12px;
  margin-bottom: 0.7em;
  padding-bottom: 0.7em;
  border-bottom: 1px dashed rgba(183, 151, 110, 0.3);
  animation: blockFadeIn 0.5s ease forwards;
}
.block.recap {
  color: var(--ink-soft);
  opacity: 0.72;
  font-style: italic;
  font-size: 14px;
  border-left: 2px solid rgba(183, 151, 110, 0.2);
  padding-left: 14px;
  margin-left: -14px;
}
.block.recap.current-marker {
  border-left-color: var(--rust);
  border-left-width: 3px;
  opacity: 1;
  color: var(--ink);
  font-style: normal;
}

/* ============ CHOICES ============ */
.choice-inline {
  color: var(--rust);
  text-decoration: none;
  border-bottom: 1px solid var(--rust);
  padding-bottom: 1px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.choice-inline:hover { color: var(--rust-bright); border-color: var(--rust-bright); }
.choice-inline.chosen { color: var(--ink); border-color: transparent; font-style: italic; }
.choice-inline.faded { color: var(--ink-fade); border-color: transparent; pointer-events: none; }

.choice-menu {
  margin-top: 1.2em;
  display: flex;
  flex-direction: column;
  gap: 0.6em;
  opacity: 0;
  animation: menuFadeIn 0.7s ease forwards;
}
@keyframes menuFadeIn { to { opacity: 1; } }

.choice-option {
  color: var(--rust);
  font-size: 15px;
  cursor: pointer;
  padding: 3px 0;
  padding-left: 18px;
  position: relative;
  transition: color 0.2s, transform 0.2s;
  font-family: inherit;
  background: none;
  border: none;
  text-align: left;
  width: 100%;
  line-height: 1.5;
}
.choice-option::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--rust);
}
.choice-option:hover { color: var(--rust-bright); transform: translateX(2px); }
.choice-option:hover::before { color: var(--rust-bright); }

/* ============ ADVANCE INDICATOR ============ */
.advance-indicator {
  position: absolute;
  bottom: 10px;
  right: 16px;
  width: 5px;
  height: 5px;
  background: var(--ink-fade);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  animation: pulse 1.5s ease-in-out infinite;
}
.advance-indicator.visible { opacity: 0.5; }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

/* ============ END SCREEN ============ */
.end-screen {
  text-align: center;
  padding: 28px 18px;
  animation: blockFadeIn 1s ease forwards;
}
.end-screen h2 {
  font-weight: 400;
  font-size: 16px;
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 16px;
}
.end-screen p {
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 10px;
}
.end-screen .restart {
  margin-top: 20px;
  color: var(--rust);
  cursor: pointer;
  font-style: italic;
  font-size: 13px;
  background: none;
  border: none;
  font-family: inherit;
  text-decoration: underline;
  text-decoration-color: var(--rust);
}
.end-screen .restart:hover { color: var(--rust-bright); }

/* ============ MOBILE / SMALL SCREENS ============ */
/* On small screens the speech bubble has to shift. 
   Kit stays in the corner but the bubble goes center-screen */
@media (max-width: 560px) {
  .bubble-container {
    bottom: auto;
    right: 50%;
    top: 50%;
    transform: translate(50%, -50%) scale(0.9);
    transform-origin: center;
    width: 92vw;
    height: auto;
    max-height: 75vh;
  }
  .bubble-container.open {
    transform: translate(50%, -50%) scale(1);
  }
  .bubble-container::after {
    /* Hide tail on mobile — bubble is no longer attached to Kit */
    display: none;
  }
  .kit-container { bottom: 4%; right: 4%; }
  .kit-img { width: 140px; }
}

/* When viewport is short (landscape mobile), also use center bubble */
@media (max-height: 620px) {
  .bubble-container {
    bottom: auto;
    right: 50%;
    top: 50%;
    transform: translate(50%, -50%) scale(0.9);
    transform-origin: center;
    height: auto;
    max-height: 80vh;
  }
  .bubble-container.open {
    transform: translate(50%, -50%) scale(1);
  }
  .bubble-container::after { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

.back-btn {
  background: none;
  border: none;
  color: var(--ink-fade);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: 3px;
  font-family: inherit;
  transition: color 0.2s, background 0.2s, opacity 0.3s;
  opacity: 1;
}
.back-btn:hover { color: var(--ink-soft); background: rgba(183, 151, 110, 0.1); }
.back-btn.hidden { opacity: 0; pointer-events: none; }

.block em { font-style: italic; color: var(--ink); }
.block strong { font-weight: 600; color: var(--ink); }

.block.auto-pause {
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--ink-fade);
  font-size: 18px;
  letter-spacing: 4px;
  padding: 8px 0;
  opacity: 0.4;
  animation: pauseBreathe 1.5s ease-in-out;
}
@keyframes pauseBreathe {
  0%, 100% { opacity: 0.25; }
  50% { opacity: 0.5; }
}

.bookmark-btn {
  background: none;
  border: none;
  color: var(--ink-fade);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 7px;
  border-radius: 3px;
  font-family: inherit;
  transition: color 0.2s, background 0.2s, opacity 0.3s;
  position: absolute;
  bottom: 12px;
  right: 42px;
  opacity: 0;
  pointer-events: none;
}
.bubble-content.advance-ready .bookmark-btn,
.bubble-content .bookmark-btn.active {
  opacity: 0.6;
  pointer-events: auto;
}
.bookmark-btn:hover { color: var(--rust); opacity: 1; }
.bookmark-btn.active { color: var(--rust); opacity: 0.9; }

/* Scene revisit menu (Pattern B) */
.revisit-panel {
  padding: 8px 4px;
  animation: blockFadeIn 0.6s ease forwards;
}
.revisit-intro {
  color: var(--ink-soft);
  font-style: italic;
  font-size: 14px;
  margin-bottom: 18px;
  text-align: center;
  line-height: 1.5;
}
.revisit-scene {
  background: rgba(255, 252, 246, 0.6);
  border: 1px solid rgba(183, 151, 110, 0.2);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--ink);
  font-size: 14px;
  font-family: inherit;
  text-align: left;
  width: 100%;
  display: block;
}
.revisit-scene:hover {
  border-color: var(--rust);
  background: var(--cream-warm);
  transform: translateX(2px);
}
.revisit-scene-number {
  color: var(--ink-fade);
  font-size: 11px;
  font-style: italic;
  margin-right: 8px;
}

/* Bookmark indicator in story picker */
.bookmark-indicator {
  display: inline-block;
  font-size: 10px;
  color: var(--rust);
  font-style: italic;
  margin-top: 4px;
}

/* Begin-again options inside end screen / picker */
.begin-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
  align-items: center;
}
.begin-option {
  color: var(--rust);
  cursor: pointer;
  font-style: italic;
  font-size: 14px;
  background: none;
  border: none;
  font-family: inherit;
  padding: 6px 10px;
}
.begin-option:hover { color: var(--rust-bright); }
.begin-option.secondary {
  color: var(--ink-fade);
  font-size: 13px;
}
.begin-option.secondary:hover { color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="stage">
    <div class="kit-hint" id="kitHint">click kit to begin</div>
    <div class="kit-container" id="kitContainer" role="button" aria-label="Click Kit to begin" tabindex="0">
      <img class="kit-img" id="kitImg" src="" alt="Kit the fox">
      <div class="kit-shadow"></div>
    </div>
    <div class="bubble-container" id="bubble" role="dialog" aria-label="Kit's speech bubble">
      <div class="bubble-header">
        <span class="story-title" id="storyTitle">Kit</span>
        <div class="header-actions">
          <button class="back-btn hidden" id="backOneBtn" aria-label="Go back one step">&larr; back</button>
          <button class="header-btn" id="backToMenuBtn" aria-label="Back to stories" style="display:none;">stories</button>
          <button class="header-btn" id="closeBtn" aria-label="Close">close</button>
        </div>
      </div>
      <div class="bubble-content" id="bubbleContent"></div>
      <button class="bookmark-btn" id="bookmarkBtn" aria-label="Bookmark this moment" title="Bookmark this moment">+ bookmark</button>
      <div class="advance-indicator" id="advanceIndicator" aria-hidden="true"></div>
    </div>
  </div>

// Ending selection logic
function selectEnding(texture) {
  const { warmth, curiosity, ana_connection, teodor_connection, mira_trust } = texture;
  
  // Ending 4: true_companion — rare, requires generous engagement across all three
  if (warmth >= 4 && mira_trust >= 4 && ana_connection >= 3) {
    return 'ending_true_companion';
  }
  
  // Ending 1: warm_ana — high ana connection + visited east road
  if (ana_connection >= 4 && teodor_connection >= 1) {
    return 'ending_warm_ana';
  }
  
  // Ending 2: mira_centered — child-focused playthrough
  if (mira_trust >= 3 && warmth >= 2) {
    return 'ending_mira_centered';
  }
  
  // Ending 3: distant_warmth — the default, true for most players
  return 'ending_distant_warmth';
}

        { kind: 'dialogue', character: 'Mrs Hamida', text: 'The letters are from her late husband. This much I have worked out. I looked in her room once, when I was fetching her cardigan. There is a box under her bed. A tin box, painted blue. I did not open it. But I saw that she had been kneeling beside it, and the box was open, and when she saw me, she closed it very quickly. That was about three weeks ago. It was the first morning she cried.' },
        { kind: 'narration', text: 'Mrs Hamida looks at you directly. In this light, the green of her cardigan is almost grey.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Ten o\'clock.' },
        { kind: 'narration', text: 'And the bell makes its small sound, and she is gone.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You sit at the counter for a while.' },
        { kind: 'narration', text: 'From the back room your aunt calls: *Who was that?*' },
        { kind: 'narration', text: 'You say it was Mrs Hamida.' },
        { kind: 'narration', text: 'There is a pause.' },
        { kind: 'narration', text: '*Hamida*, your aunt says. *From Sixth Mile. I see. What did she want?*' },
        { kind: 'narration', text: 'You tell her.' },
        { kind: 'narration', text: 'There is a longer pause. Then your aunt says, from the back room, in the voice she uses when she is giving you a piece of information that is not, strictly, a piece of information:' },
        { kind: 'dialogue', character: 'your aunt', text: 'Kamala Addy was a very good teacher. Her husband was also a good man. He died, I think, eleven years ago. It is *not good* that she is crying. I am glad you are going.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You sit with the book on your lap. Outside, on the street, a dog walks past in the direction of the bakery.' },
        { kind: 'narration', text: 'It is not Pepa. But for a moment, from the angle at which it passes the window, it looks very much like her.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'kamalas_kitchen' }
      ]
    },
    kamalas_kitchen: {
      blocks: [
        { kind: 'narration', text: 'Mrs Addy\'s house is a ten-minute walk from the post office, along a road that becomes, at its last hundred yards, a lane. The lane has a name you will not learn for three more days. The house is the third from the end. It is single-storey in front and two-storey behind, because the land slopes, and the second storey is built into the hill.' },
        { kind: 'narration', text: 'Mrs Hamida meets you at the gate. She looks at her watch without looking at her watch.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Good. Come.' },
        { kind: 'narration', text: 'The front door is open. The kitchen is to the right. In the kitchen is a small round table with two chairs, and a third chair has been brought in from elsewhere, and there is a teapot on the table, and three cups, and a plate of biscuits. On one of the chairs is a woman.' },
        { kind: 'narration', text: 'She is small. Her hair is white and very fine. She is wearing a blue cotton kurta and a grey cardigan, and her glasses are on her nose, and she is reading a book, or she has been reading a book — the book is open on her lap and her hand is still on the page. When you come in, she looks up, and for a long moment she is not sure who you are. Then Mrs Hamida says something to her in what you think is Bangla, and the woman\'s face clears, and she closes the book and stands up.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'So. The niece from the post office. Come in, come in, sit down. Hamida, the tea.' },
        { kind: 'narration', text: 'Her voice is gentle and very slightly formal, the voice of someone who has taught thirty-six years of children to speak carefully. You sit. Mrs Hamida pours tea. Mrs Addy asks, in rapid order, where you are from, what you do, how long you are staying, whether you like the town, what is your favorite book of the year so far, and do you take sugar. She does not wait for most of your answers.' },
        { kind: 'pause', weight: 1 },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Hamida has told me you wanted to see my old schoolbooks. I have a box of them. They are not very interesting, but you may look at them. They are upstairs. I will bring them down in a moment. First, tea.' },
        { kind: 'narration', text: 'You drink tea. The tea is strong. Mrs Addy drinks hers quickly, the way people drink tea when they are not noticing the tea. Mrs Hamida does not drink hers at all. She watches Mrs Addy over the rim of her untouched cup.' },
        { kind: 'narration', text: 'Mrs Addy notices this.' },
        { kind: 'narration', text: 'She sets down her tea. She looks at Mrs Hamida for a moment, and something about her face, some very small thing around her mouth, goes briefly tight. Then she looks at you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: '*Hamida* has brought you here for something else. Isn\'t it so, Hamida.' },
        { kind: 'narration', text: 'Mrs Hamida does not answer. She looks at her hands.' },
        { kind: 'narration', text: 'Mrs Addy closes her eyes for a moment. When she opens them, there are tears in them, but they do not fall.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Very well. Very well. I suppose it is not such a bad thing. I have not been sleeping. It would be good to say it out loud to a person. And a person who is not from here is perhaps the only person I could say it to.' },
        { kind: 'narration', text: 'She looks at you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Someone has been taking letters from a box under my bed.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You wait.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'They began three weeks ago. I did not notice at first. I have not opened the box in perhaps two years. One afternoon I took it out — I do not remember now what made me take it out — and I saw that one letter was missing. I thought, I have misplaced it, I have moved it somewhere. I looked. I could not find it. A week later I checked again and a second letter was gone. That was when I understood.' },
        { kind: 'narration', text: 'Mrs Hamida pours more tea, although no one has finished the first cup.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'They are letters from my husband. He is dead. Eleven years.' },
        { kind: 'narration', text: 'Mrs Addy folds her hands in her lap in a gesture that has the quality of something long practiced.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'There are — there were — a hundred and forty-two of them. From before we were married. And from the years he traveled for work. He traveled often, in the last years, for the government. The letters were from all of those times. I did not count all of them, in those years. I have counted them now. There are a hundred and thirty-four today. *Eight* are missing.' },
        { kind: 'narration', text: 'You ask whether she has any idea who.' },
        { kind: 'narration', text: 'She shakes her head.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I have thought of everyone who could have come into the room. It is not many people. And none of them — none of them makes any sense. They would not take them. Why would they take them. These are *letters*. From a husband nobody else knew as well as I did. They are — they are not — they are not of value to anyone but me.' },
        { kind: 'narration', text: 'A tear falls now. She does not wipe it away. She is, you realize, a woman who considers crying a rudeness, and who has spent three weeks alone trying to manage the rudeness in private, and who is now, at this table, giving up on the project.' },
        { kind: 'narration', text: 'Mrs Hamida reaches across and places her hand on Mrs Addy\'s arm.' },
        { kind: 'narration', text: 'After a moment, Mrs Addy reaches up and places her own hand over Mrs Hamida\'s. It is the only gesture of affection you have seen between them, and you understand, seeing it, that it is a gesture that does not happen often between them, which is why it matters now.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'Then Mrs Addy, without moving her hand, says:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Would you like to see the box?' },
        { kind: 'narration', text: 'You say you would.' },
        { kind: 'narration', text: 'She leads you up a narrow staircase into a small bedroom. The bed is made. Beside the bed is a low wooden cupboard. From under the bed she pulls out a tin box. The box is painted blue. The paint is chipped in several places. The clasp is brass.' },
        { kind: 'narration', text: 'She sets it on the bed and opens it.' },
        { kind: 'narration', text: 'The letters are inside, stacked in loose order, some in envelopes and some not. She takes out the top handful and fans them. They are organized by year. You can see the dates at the tops of the ones not in envelopes: 1941, 1942, 1943. She puts them back and takes out a different handful.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: '1949. Here — this is where one is missing. See. This one is April. And this one is June. There is *no May*. Joseph always wrote to me in May. Every May.' },
        { kind: 'narration', text: 'She sets them down.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'All the missing ones are from 1949 and 1950. Those were his two years at Simla, working at the Viceroy\'s old building, which was an archive by then. He was — he liked being at Simla. He wrote longer letters from there than from anywhere else. He wrote to me about the library there. He wrote to me about the walks. He wrote to me about the weather, which he knew I liked to hear about, because in those years I was teaching and could not travel.' },
        { kind: 'narration', text: 'She stops.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Why would someone take those, specifically. Why *those*.' },
        { kind: 'narration', text: 'She looks up at you.' },
        { kind: 'narration', text: 'You do not have an answer.' },
        { kind: 'narration', text: 'She nods. *I thought not*, she says. *I have not been able to think of one either.*' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You sit together for a while, the three of you, with the box open on the bed.' },
        { kind: 'narration', text: 'After a time Mrs Addy says, quietly:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'If it happens again, I will know. It was — there was a letter from 1950 still there yesterday. A long one. He wrote about a book he had read at the library and thought I would like. If that one is gone by next week, I will know that whoever is doing this has been in my room in the next seven days.' },
        { kind: 'narration', text: 'She does not, yet, tell you their names.' },
        { kind: 'narration', text: 'What she does is close the box, push it back under the bed, and smooth the coverlet above it. Then she stands up, and her knees make the small sound that old knees make when they rise.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'That is enough for today. Come back in four days, perhaps. I will think in the meantime.' },
        { kind: 'pause', weight: 1 },
        { kind: 'narration', text: 'Before you leave — an hour later, after more tea, after Mrs Addy has insisted you take two biscuits for the road — you notice, on a shelf beside the front door, a small framed photograph. A man in a grey suit, perhaps fifty years old, standing in a doorway somewhere. The doorway is not this house. The man is slim, bespectacled, and is not smiling, but his face, at rest, is the face of a person who has recently been smiling.' },
        { kind: 'narration', text: 'This is, although you do not ask, Joseph Addy.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You walk back down the lane with Mrs Hamida. She does not speak for most of the walk. At the gate of the post office she stops.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She did not tell you.' },
        { kind: 'narration', text: 'You ask what.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She did not tell you the names of the people who were in her room. I do not know yet whether she meant not to tell you, or whether she has not decided. I think she has not decided.' },
        { kind: 'narration', text: 'You say you will come back in four days.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Good. Until then — do not ask around the town about her. Please. The town is a very small town. If you ask, the asking will be known.' },
        { kind: 'narration', text: 'You say you will not ask.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Thank you. I will see you on Saturday.' },
        { kind: 'narration', text: 'She walks back down the lane. You watch her go. Above the town, the ridge is visible in its entirety, and above the ridge there is a single cloud shaped like a hand, with fingers, extending out over the valley.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'wednesday_morning' }
      ]
    },
    wednesday_morning: {
      blocks: [
        { kind: 'narration', text: 'Saturday is four days away, and three of those days are quiet. You finish the novel your aunt asked you to read. You walk up to the viewpoint twice. On the second day it rains in the late afternoon and you sit on the verandah of the post office and watch the street turn dark.' },
        { kind: 'narration', text: 'On Wednesday morning, the morning before your second visit to Mrs Addy, you walk up to her house on your own, not to go in but only to see what Wednesdays look like there.' },
        { kind: 'narration', text: 'You are not sure why you do this. Mrs Hamida told you not to ask around the town, and walking is not asking. But you understand, obscurely, that it is also not *not* asking. You feel a small shame about it. You walk up anyway.' },
        { kind: 'pause', weight: 1 },
        { kind: 'narration', text: 'You do not go to the gate. You stop at the corner, where the lane meets the road, beside a jamun tree. From there you can see the gate but not the door.' },
        { kind: 'narration', text: 'At ten minutes past nine, a boy comes up the lane with a basket of vegetables on his head.' },
        { kind: 'narration', text: 'He is perhaps sixteen. He is wearing a blue shirt with the collar turned up in the back, which you understand is how boys of sixteen wear their shirts everywhere in the world. The basket on his head is full and heavy, and he carries it without seeming to notice it, the way a person carries a thing their body has carried since they were nine years old.' },
        { kind: 'narration', text: 'He goes to Mrs Addy\'s gate. He does not ring a bell. He does not knock. He opens the gate and walks up to the front door and the door opens before he reaches it — Mrs Addy has heard him, or has been waiting. He sets the basket down on the step. Mrs Addy reaches into the basket and takes out some vegetables and hands some money to the boy.' },
        { kind: 'narration', text: 'The boy counts the money. Then he puts the money in his breast pocket and he says something to Mrs Addy that makes her *laugh* — actually laugh, the first time you have seen her laugh — and she says something back, and he picks up the basket and he leaves.' },
        { kind: 'narration', text: 'He walks past you without looking at you. He is singing a film song quietly, to himself, three phrases he repeats, and then he is out of earshot.' },
        { kind: 'narration', text: 'The film song is from two years ago. You remember when it came out.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You stand under the jamun tree for a while longer. The door of the house has closed. Mrs Addy has gone back inside with her vegetables. You realize that you have seen, just now, something you did not expect to see, which is a person being *pleased*. Mrs Addy, in the half-minute she spoke to the boy, was pleased. She laughed. Then the door closed and you do not know what she does with the rest of the morning.' },
        { kind: 'narration', text: 'You walk back down to the post office.' },
        { kind: 'narration', text: 'On the way, a thought you cannot quite hold on to rises and settles in the back of your mind: *she laughed*. It is not a thought yet. It is a shape.' },
        { kind: 'pause', weight: 1 },
        { kind: 'narration', text: 'Your aunt is at the counter when you come in. She looks at you over her glasses.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Where have you been.' },
        { kind: 'narration', text: 'It is not a question.' },
        { kind: 'narration', text: 'You say you went for a walk.' },
        { kind: 'narration', text: '*A walk*, says your aunt, and returns to her newspaper. After a minute she adds, not looking up:' },
        { kind: 'dialogue', character: 'your aunt', text: 'Tomorrow is Saturday.' },
        { kind: 'narration', text: 'You say you know.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Hamida is a careful person. So is Kamala. If they have asked for your help, it is because they have not been able to ask anyone else. You will go *gently*.' },
        { kind: 'narration', text: 'You say you will.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Good.' },
        { kind: 'narration', text: 'And that is the morning.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'saturday_ten_oclock' }
      ]
    },
    saturday_ten_oclock: {
      blocks: [
        { kind: 'narration', text: 'You arrive at Mrs Addy\'s gate at five minutes to ten. Mrs Hamida is already there. She is wearing the same green cardigan but has added a thin silver chain with a small flat pendant, and the effect is that she looks slightly more formal than last time, although nothing else has changed.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She has made cake. I do not know why. She has not baked in a year. But this morning she has baked.' },
        { kind: 'narration', text: 'You ask how Mrs Addy is.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She is better than last week. She slept, which she had not been doing. And she will be glad to see you. She told me so twice this morning, which is not a thing she would ordinarily say twice.' },
        { kind: 'narration', text: 'She opens the gate.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Also — I should say this now. Mrs Wright is coming. She comes every Wednesday, not Saturday, but Kamala asked her also to come today. I do not know why Kamala asked her. You will meet her.' },
        { kind: 'narration', text: 'You ask who Mrs Wright is.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Eleanor Wright. An Anglo-Indian lady. Retired teacher, like Kamala. They were teachers together at the convent school for — oh, thirty years. She lives up past the church. They have been friends since they were both twenty-two.' },
        { kind: 'narration', text: 'Mrs Hamida lowers her voice, although no one is near enough to hear.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Eleanor is not well. Cancer, I think. She does not say it, but I have eyes.' },
        { kind: 'narration', text: 'You say that you are sorry to hear it.' },
        { kind: 'narration', text: 'Mrs Hamida nods.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She is a good person. Eleanor. She is the kind of person who — she is the kind of person who, when my husband died, was the third person to come to my house, after Kamala and after my sister. I had known her for three years at that time, not long. She came. She sat. She did not speak for an hour. Then she went home. That is the kind of person she is.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'The door opens before Mrs Hamida can knock.' },
        { kind: 'narration', text: 'Mrs Addy is in the doorway, wearing a pale blue sari you have not seen her in before, and her hair has been pinned up. She does not look as she did on Wednesday. Something has been put back.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Come in. Hamida, the kettle is already on. Come.' },
        { kind: 'narration', text: 'The kitchen table has been set for four. There is a pale yellow cake in the middle of the table, slightly lopsided but clearly homemade, and there is a small bowl of jam beside it.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I made this cake because on Wednesday, after you both left, I thought about what it has been like in this house for three weeks, and I realized I did not want it to be like that anymore. So I made a cake. It is not a very good cake. Joseph was the one who could bake. I am a teacher, I am not a baker. But it is a cake. Sit.' },
        { kind: 'narration', text: 'You sit.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor will be here at ten past. She is never on time. She says she is, but she is not. I expect her in perhaps four minutes.' },
        { kind: 'narration', text: 'It is, in fact, fifteen minutes before Mrs Wright arrives, and Mrs Addy and Mrs Hamida and you have drunk one cup of tea each by then, and Mrs Addy has told you two long stories about her teaching years — a student who later became a minor poet, and a year in which the convent school flooded — neither story connected to anything you are here about, both told with the animation of a person who has not told stories in a while.' },
        { kind: 'pause', weight: 1 },
        { kind: 'narration', text: 'Then the knock.' },
        { kind: 'narration', text: 'Mrs Wright is tall. You had not expected her to be tall. She is perhaps sixty-five, though it is difficult to tell — she carries herself straight, and her hair, which is a very pale grey, is cut short in a way that suggests she has cut it short for forty years and sees no reason to stop. She wears a brown wool skirt and a cream blouse and a thin grey cardigan that has a mend on one elbow. Her eyes are very blue. When she sees you, she smiles, and the smile reaches her eyes, which is not always the case with older women meeting someone new in a small town.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'The famous niece. Kamala told me on the telephone yesterday. I came early on purpose — well, early for me. Kamala knows what that means. Hello, Hamida, darling.' },
        { kind: 'narration', text: 'She kisses Mrs Hamida on the cheek. Mrs Hamida, who does not seem to be a woman who is kissed often, accepts this calmly, as if it were the one social custom in her life she has chosen to permit.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Sit, sit.' },
        { kind: 'narration', text: 'Eleanor sits. She looks at the cake.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Oh, Kamala. *You* made this. Oh. How lovely. How very lovely. Joseph used to say —' },
        { kind: 'narration', text: 'She stops.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Well. You know what Joseph used to say.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'That I was a terrible baker. Yes.' },
        { kind: 'narration', text: 'Eleanor laughs. It is a short laugh, warm at the start and thin at the end.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'That I loved you anyway, was the rest of the sentence.' },
        { kind: 'narration', text: 'The three of them are quiet for a moment. The kitchen holds the smell of the cake and of the tea, and the small creak of the old window frame in its sash, and nothing else.' },
        { kind: 'narration', text: 'Then Eleanor says, brightly:' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Tell me about yourself, dear. Kamala said you read books. What books?' },
        { kind: 'narration', text: 'You tell her. The book you are currently reading, the novel your aunt assigned you, a book you read last year that you still think about. Eleanor listens with what you can only describe as *attention* — the specific attention of a teacher whose habit of listening has outlasted her classroom. She asks one question per book, and each question is surprisingly precise. She has read two of the three. She disagrees, gently, with one of your opinions.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'But you are young. You will read it again in ten years and see it differently. That is the best thing about being young — all the books you read now are only your first reading of them.' },
        { kind: 'narration', text: 'You ask her what she reads.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Oh, everything. But mostly history, now. Indian history, which I have been told all my life I do not really have a right to, because of my parentage, but which I continue to find the most interesting subject in the world. I have been working my way through Ranade. It is — well, it is slow going, but it is worth it.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor has been reading Ranade for three years.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I have been reading Ranade *carefully* for three years. There is a difference.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Tell me, niece — is your aunt well? I have not seen her in perhaps two months. I keep meaning to go by the post office but I do not have much use for posts these days, and going only to sit is an old woman\'s excuse.' },
        { kind: 'narration', text: 'You say your aunt is well. You mention that she is eighty-one and that the job of running the post office appears to be keeping her intact.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'That is often the case. The daily thing. The small pattern. It is what keeps us in ourselves.' },
        { kind: 'narration', text: 'She glances, as she says this, at Mrs Addy — a very brief glance — and Mrs Addy does not notice, or does not acknowledge noticing.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala, how is the cake? Are you going to cut it? I did not come all the way here to stare at it.' },
        { kind: 'pause', weight: 1 },
        { kind: 'narration', text: 'The cake is cut. It is, as Mrs Addy predicted, not a very good cake — slightly dry, slightly under-sugared. Everyone eats two pieces.' },
        { kind: 'narration', text: 'The conversation that follows is, for an hour, about nothing in particular. The town. A house that is being repainted. A dog that has gone missing from the bakery. The new tea at a shop on the main road. Eleanor tells a long story about buying a typewriter ribbon in Siliguri that turns out to be mostly about the bus ride — *that was the route I took to my sister\'s when we lived in Simla, oh, years ago*. Mrs Hamida tells a short, unflashy story about a conversation with her gardener. Mrs Addy mostly listens, but her face is lighter than it was on Wednesday, and once, when Eleanor makes a small joke about the convent-school headmaster from thirty years ago, she laughs — a real laugh, with surprise in it.' },
        { kind: 'narration', text: 'You watch Eleanor. You are watching her without meaning to. You are not sure, at this moment, *why* you are watching her, except that she is the most interesting person in the room, and you notice that you notice this about her, and then, because you notice that you notice, you try to catch yourself watching and to not be obvious about it.' },
        { kind: 'narration', text: 'Eleanor catches you.' },
        { kind: 'narration', text: 'It is a very small thing. She is telling the typewriter-ribbon story and you are looking at her, and for a fraction of a second she glances over at you, and her eyes meet yours, and she sees — *sees*, in the way older women see these things — that you are not listening to the story, you are watching *her*. Her eyes do not change expression. The story continues. But something in her posture adjusts, infinitesimally. She becomes, if such a thing is possible, more visible, as a person aware of being watched becomes more visible.' },
        { kind: 'narration', text: 'After this, you make yourself listen to the story, not to her. The story ends. Everyone laughs.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'At half past eleven, Eleanor stands.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I must go. I have a telephone call at twelve and it is from Delhi, which means that if I am not standing next to the telephone at exactly twelve I will not receive the call at all. Kamala, darling. The cake was terrible and I loved it. Hamida. Niece.' },
        { kind: 'narration', text: 'She nods to each of you.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I will see you next week. Kamala, you will come on Wednesday as usual? Yes? Good.' },
        { kind: 'narration', text: 'She kisses Mrs Addy on the cheek, then Mrs Hamida. She shakes your hand — her hand is dry and cool and her grip is surprisingly firm. Then she is gone.' },
        { kind: 'narration', text: 'The three of you sit in the kitchen for a few minutes after the door closes.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor is very fond of you already. I can tell. She asked about books. She does not ask about books unless she likes someone. Did she seem well to you, Hamida?' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'She seemed thinner than last month.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Yes. I thought so too.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'Then Mrs Addy says, in a different voice — quieter, more private:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I checked the box this morning. Before I made the cake. There is one more letter gone. The one from 1950 that I told you about. The long one, about the library.' },
        { kind: 'narration', text: 'Mrs Hamida draws in her breath. You do not move.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'So. Whoever it is has been here again. Between Wednesday and this morning. Which means — well. Deepa is coming tomorrow from Calcutta, as she does every second month. Mr Dorji goes up and down the stairs every day but he has always done that. Thinley comes on Wednesdays. Eleanor was here last Wednesday but not since.' },
        { kind: 'narration', text: 'She stops. She looks at the cake on the table. Then she says, as if to herself:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I do not believe it is any of them.' },
        { kind: 'narration', text: 'You do not say anything. Mrs Hamida does not say anything. The town outside the kitchen window makes its small Saturday sounds.' },
        { kind: 'narration', text: 'After a while, Mrs Addy says:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Come back on Thursday. After Deepa has come and gone. I would like you to meet her. And Mr Dorji — perhaps you could come up with me one evening to take him his rent, which is what I have been doing for twelve years now. He is a private man. You cannot go to see him. But you can come with me when I go.' },
        { kind: 'narration', text: 'You say you will.' },
        { kind: 'narration', text: 'When you leave, the cake is still on the table, most of it uneaten. Mrs Addy wraps a piece in a cloth and presses it into your hands.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'For your aunt. Tell her I asked after her. Tell her the cake is bad. She will enjoy that.' },
        { kind: 'narration', text: 'On the walk down the lane, Mrs Hamida is unusually quiet.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Eleanor likes you. I could tell. But there was a moment — I thought for a moment she looked sad. When she was telling the typewriter story. Did you see it?' },
        { kind: 'narration', text: 'You say you did not.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'No. Well. I may have imagined it. I imagine a great many things these days. One must be careful.' },
        { kind: 'narration', text: 'At the gate of the post office, she stops.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Thursday.' },
        { kind: 'narration', text: 'You say yes, Thursday.' },
        { kind: 'narration', text: 'She walks away. The pendant on her silver chain catches the light once, just before she turns the corner, and is gone.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'deepa_didi' }
      ]
    },
    deepa_didi: {
      blocks: [
        { kind: 'narration', text: 'Monday is quiet. Tuesday is quiet. On Wednesday morning your aunt hands you a small package across the counter — a book that has arrived by post for her — and says:' },
        { kind: 'dialogue', character: 'your aunt', text: 'Hamida was in yesterday. She said Deepa has arrived. She said Kamala is tired. She said the letter from Tuesday has also gone.' },
        { kind: 'narration', text: 'You did not know this. You ask when.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Yesterday sometime. Kamala checked the box in the morning and it was still there. Hamida came at four and found her in the kitchen in the dark, and when Hamida asked, Kamala said she had already checked again that afternoon and the letter was missing. The only person in the house between morning and afternoon was Deepa.' },
        { kind: 'narration', text: 'You ask whether Deepa could have done it.' },
        { kind: 'narration', text: 'Your aunt takes a long time to answer. She opens the package, lifts out the book, turns it over, puts it on the counter.' },
        { kind: 'dialogue', character: 'your aunt', text: 'I have known Deepa Addy since she was fourteen years old. She is a good woman. Not a careful woman, but a good one. If she had found a letter she should not be reading, she would have told Kamala. She would not have taken it.' },
        { kind: 'narration', text: 'Your aunt pauses.' },
        { kind: 'dialogue', character: 'your aunt', text: 'But I have known a great many good people who have done things I would not have expected them to do. So I do not say it cannot have been her. I say only that it would surprise me very much.' },
        { kind: 'narration', text: 'You ask your aunt what you should do on Thursday.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Meet Deepa. Listen to her. If you have a sense afterwards that it was not her, tell Hamida that. If you have a sense that it was, say nothing to anyone, and tell Hamida quietly, later. These are not conversations to have quickly.' },
        { kind: 'narration', text: 'She hands you the book.' },
        { kind: 'dialogue', character: 'your aunt', text: 'Now go and take this to Mrs Karki at number twelve. She has been asking about it for a week. And be back by noon.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'On Thursday morning at ten, you walk up to the house.' },
        { kind: 'narration', text: 'You hear Deepa-didi before you see her. She is standing in the front garden with a watering can, talking loudly to someone inside — Kamala, presumably — about a roof tile that has cracked, and whether Kamala knows about it, and whether Mr Dorji has been told, and whether it is going to rain this evening, and whether the tile can wait until tomorrow.' },
        { kind: 'narration', text: 'When she sees you at the gate, she stops mid-sentence, sets down the watering can, and comes to meet you with her hand extended.' },
        { kind: 'dialogue', character: 'Deepa', text: 'You must be the niece. I am Deepa. Kamala\'s sister. Younger by four years, though most people think I am older, which is flattering to Kamala and less flattering to me. Come in. Kamala is in the kitchen. Have you eaten? No, you have eaten, you have the look of a person who has eaten. Come, come, come.' },
        { kind: 'narration', text: 'She shepherds you in.' },
        { kind: 'narration', text: 'Deepa is larger than Kamala — not fat, but built differently, broader. Her hair is dyed black with some skill. She wears a gold bracelet on each wrist and a heavy chain with a locket. She moves the way some older women move, which is to say she does not allow anyone else to move until she has finished moving. By the time you are seated in the kitchen, she has poured you tea without asking and put a plate of biscuits in front of you and asked you four questions and answered two of them herself.' },
        { kind: 'narration', text: 'Kamala, at the table, looks tired but fond.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Deepa is here until Sunday. She came on Monday. She came on Monday, Deepa, and you said you would stay for three days, and it is now Thursday. How long are you staying?' },
        { kind: 'dialogue', character: 'Deepa', text: 'Until I feel like going. Which may be Sunday, which may be next Wednesday. Calcutta is not going anywhere. My husband can feed himself, and if he cannot, he will eat at his sister\'s, which will serve him right for not learning to cook in forty-five years of marriage.' },
        { kind: 'narration', text: 'She laughs at her own joke, which you notice is a thing she does often.' },
        { kind: 'dialogue', character: 'Deepa', text: 'And *you*, niece, are here for how long?' },
        { kind: 'narration', text: 'You tell her.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Three more weeks! Good. You should come to Calcutta. If you are ever in Calcutta, you come to our house. It is a terrible house but there is always food. Kamala, give her the address before she leaves.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'She has three weeks.' },
        { kind: 'dialogue', character: 'Deepa', text: 'All the more reason to give it to her now, before we both forget.' },
        { kind: 'narration', text: 'Deepa moves on. She is, you realize, a force in the house — a force that has been in the house for four days and will be in the house for perhaps four more, and during that time no ordinary rhythm of the house is possible. Kamala accepts this with the patience of a sister who has accepted it her whole life.' },
        { kind: 'dialogue', character: 'Deepa', text: 'I came because Kamala sent me a letter two weeks ago that said only, *I have been unwell. It would be good to see you*. Which is Kamala\'s way of saying, *please come immediately*. Kamala has always written like that. In our family, if you wish to be taken seriously, you must translate every sentence by one degree upward in urgency. I told my husband, I said, Kamala needs me, I am going. And so here I am.' },
        { kind: 'narration', text: 'Kamala looks at her sister with the expression of a woman whose sister has told this story about her before and will tell it many more times.' },
        { kind: 'dialogue', character: 'Deepa', text: 'And what is the matter, Kamala? She will not tell me. I have been here four days. I have asked three times. She says *nothing, nothing, I was only a little unwell*. But a person who is only a little unwell does not write you a letter in the middle of the night. I know this. I have been her sister for sixty-one years.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'Kamala looks at you. You can see her deciding something.' },
        { kind: 'narration', text: 'Then she says:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Deepa, someone has been taking letters from Joseph\'s box.' },
        { kind: 'narration', text: 'Deepa sets down her teacup hard enough that it rings on the saucer.' },
        { kind: 'dialogue', character: 'Deepa', text: '*What*.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Someone has been taking letters from the box. Eight letters in three weeks.' },
        { kind: 'narration', text: 'Deepa stares at her sister.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Who.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I do not know.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Someone in this house.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'It must be someone who has been in my room. Yes.' },
        { kind: 'narration', text: 'Deepa is silent. You can see her face working. She looks at you, then at Kamala, then at the kitchen door, then back at Kamala.' },
        { kind: 'dialogue', character: 'Deepa', text: 'You thought it was me.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I did not —' },
        { kind: 'dialogue', character: 'Deepa', text: 'You thought it was me. Kamala. Why would I take Joseph\'s letters.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I did not think it was you, Deepa. I have been trying very hard not to think it was anyone.' },
        { kind: 'dialogue', character: 'Deepa', text: 'But today. Today you thought, *it must be Deepa, because Deepa was alone in the house yesterday afternoon*. That is what you thought. Yes?' },
        { kind: 'narration', text: 'Kamala does not answer.' },
        { kind: 'narration', text: 'Deepa sits back. After a long moment she says, still quietly:' },
        { kind: 'dialogue', character: 'Deepa', text: 'If it had been me — which it was not — I would have told you the moment I took one. I would have said, *Kamala, I found a letter in which Joseph said a terrible thing about me* — if such a letter existed, which I do not believe it does, because Joseph never said a terrible thing about anyone in his life — *and I would like to keep it*. I would have said that. I would not have crept in and out of your room. You know this.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I know.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Then why are we even —' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Because whoever is taking them is *someone I trust*, Deepa. That is the problem. I do not suspect a stranger. There has been no stranger. It is one of the four or five people I have trusted in this house for years. And I do not know which. And the thought of it is making me ill. That is why I sent you the letter. I did not know how to say that. I do not know how to say it now.' },
        { kind: 'narration', text: 'Deepa looks at her sister for a long moment. Then she reaches across the table and takes Kamala\'s hand.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Then we will find out. We will find out, and it will not be me, and it will probably not be Hamida, and whoever it is will have a reason, because people have reasons. And the reason will not destroy you.' },
        { kind: 'narration', text: 'Kamala does not answer. She lets Deepa hold her hand.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'After a while, Deepa turns to you. The force of her attention is considerable.' },
        { kind: 'dialogue', character: 'Deepa', text: 'And you. You are the one who is helping. Hamida told me this morning. You are the niece from the post office and you are helping. Yes?' },
        { kind: 'narration', text: 'You say yes.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Good. I am going to the market this afternoon. Kamala, give me the list. And the niece will stay here with you, and you will show her the letters again — *all* of them, not just the ones that are missing. I want her to see what kind of man Joseph was. Because she is helping without ever having met him. That is not right. She should know him.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Deepa —' },
        { kind: 'dialogue', character: 'Deepa', text: 'No. It is the correct thing. Niece, yes?' },
        { kind: 'narration', text: 'You say yes.' },
        { kind: 'dialogue', character: 'Deepa', text: 'Good. Then it is settled.' },
        { kind: 'narration', text: 'Deepa stands, collects a shopping bag, kisses Kamala on the forehead, tells you it was a great pleasure, wishes you a good afternoon, and sweeps out, and the house is, for the first time in two hours, quiet again.' },
        { kind: 'narration', text: 'Kamala exhales.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I love my sister, but she is exhausting.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You sit at the table with her. After a moment she gets up and goes upstairs. She comes back down with the blue tin box.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Deepa was right. You should see who he was. Sit with me for a little while.' },
        { kind: 'narration', text: 'You sit with her. She opens the box on the kitchen table. For the next hour she reads to you, in no particular order, paragraphs and sometimes whole letters. A letter from 1937 in which Joseph, newly graduated, describes his first job. A letter from 1953 in which he writes about a holiday in Kerala and the way the light moved on the backwaters at dawn. A letter from 1959 — two years before he died — in which he writes, very simply, that he is tired today, and that he has been thinking about their first house, and that he hopes Kamala remembers the blue curtains in the kitchen.' },
        { kind: 'narration', text: 'None of the letters she reads to you are from 1949 or 1950.' },
        { kind: 'narration', text: 'She does not go near that part of the box.' },
        { kind: 'narration', text: 'You notice this. You say nothing. She does not need you to say anything. She is sharing with you the part of her husband that is still, entirely, hers.' },
        { kind: 'narration', text: 'When she closes the box, she looks at you with an expression you have not seen on her before — something close to peace.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Thank you. I needed to do that. I needed to read them out loud to a person. Hamida has read them all already. Deepa has read them all already. You had not read any of them. You are, today, the only person in the world for whom Joseph Addy is a stranger who has just been introduced. That is a strange thing to give to a stranger. But it has helped me.' },
        { kind: 'narration', text: 'You tell her you are glad.' },
        { kind: 'narration', text: 'She puts the box back upstairs. When she comes down, she is holding a small white envelope, which she places on the kitchen table and pushes toward you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'This is tomorrow\'s rent for Mr Dorji. I was going to take it up this evening myself. But I think, instead, that I would like you to come with me. Hamida cannot come — she has her nephew visiting tomorrow. So it will be just you and me. Six o\'clock. Come to the house at six. We will go up together.' },
        { kind: 'narration', text: 'You say you will.' },
        { kind: 'narration', text: 'You walk home in the late afternoon. The sun has already dropped behind the ridge; the town is in shadow although the sky above is still blue. On the main road, a dog crosses in front of you — a black dog, not Pepa, but for a moment, from the angle at which it passes, the curve of its back — you think again of her. You shake your head. It is only a dog.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'mr_dorjis_roof' }
      ]
    },
    mr_dorjis_roof: {
      blocks: [
        { kind: 'narration', text: 'Friday at six o\'clock you are at Mrs Addy\'s gate.' },
        { kind: 'narration', text: 'The light is the particular soft light of an April evening in the hills — long shadows, a thin wash of gold on the ridge to the west, the valley below already in shadow. Mrs Addy comes out of the house in a shawl. She is carrying the white envelope from yesterday.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'The stairs are at the side. I will lead. The railing is unstable in one place, you will feel it. Do not lean on it there.' },
        { kind: 'narration', text: 'The stairs go up the outside of the house. The house is built into the hill, so that the ground floor — Mrs Addy\'s — opens onto the lane, and the upper floor opens at the back onto a small flat courtyard that is almost roof-height. It is not really a second storey. It is a small separate dwelling that happens to share a wall with hers.' },
        { kind: 'narration', text: 'Mr Dorji opens the door before she knocks. He has heard the stairs. He is a short man, compact, with a neat white beard and clothes that are not exactly shabby but are not exactly not shabby either. His eyes are the shape of eyes that have looked into a great deal of weather. He wears a thick red cardigan buttoned to the neck.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Mrs Addy. Come in.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I have brought the niece. And the rent.' },
        { kind: 'narration', text: 'Mr Dorji looks at you. He does not smile. But he nods, in a particular way, and steps aside, and you understand that the nod is what a smile would be for another man.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Come in. Come in, both. I have tea.' },
        { kind: 'narration', text: 'The room is not what you expected. You had expected, for some reason, a room that was sparse and monkish. What you find is a room full of books — books on every wall, books stacked on the floor beside the chairs, books on the small writing table by the window. A single oil lamp burns on a low shelf. There is an old brass bell on the table. There is a woven rug on the floor, red and dark-blue, that is probably worth more than most things in the house you came from.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'He was a librarian. For forty years. In Kolkata and Darjeeling and for a while in Gangtok. He has books that you cannot find anywhere. He will never lend them. Do not ask him.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'I will lend them. I will not lend them to *you*, Mrs Addy. Because you lent me a book in 1961 and I have never seen it again.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'It was a boring book.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'It was Sarat Chandra. You lent me Sarat Chandra and never returned the book *you lent me*, which is a logical impossibility.' },
        { kind: 'narration', text: 'He pours tea into three small cups.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'The niece may borrow. If she is careful.' },
        { kind: 'narration', text: 'He hands you a cup. His hand is very steady. You wonder how old he is. Seventy? Older?' },
        { kind: 'narration', text: 'You sit. The three of you drink tea. For a few minutes the conversation is unremarkable — weather, the rent, a roof tile that Deepa has been complaining about, which Mr Dorji has already noticed and will have replaced on Monday.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'Then Mr Dorji, looking not at Mrs Addy but at the brass bell on the table, says:' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'You are not sleeping well, Mrs Addy.' },
        { kind: 'narration', text: 'It is not a question.' },
        { kind: 'narration', text: 'Mrs Addy is quiet for a moment. Then she says:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'No.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'I hear you in the kitchen at night. The floor creaks. I do not mean to listen. But the old houses are like this. You walk at two o\'clock in the morning. Three. I have heard you for three weeks.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I am sorry, Mr Dorji.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'You do not need to be sorry.' },
        { kind: 'narration', text: 'He looks at her now. His eyes are dark and very direct.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'I did not come down because I did not want to intrude. Perhaps I should have come down. I am sorry for that.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You did not need to —' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'I thought of it, on Tuesday. You were crying. I could hear.' },
        { kind: 'narration', text: 'He says this simply, without drama.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'I sat for a long time with my hand on the door. Then I did not come down. I was not sure if you would want a neighbor you hardly know to come down at two in the morning. An old man, a widower. I was not sure. I stayed up here. I have been thinking about it since. I would like to apologize for not coming.' },
        { kind: 'narration', text: 'Mrs Addy looks at him. Her face does something complicated.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You do not need to apologize. But thank you for thinking of it.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'It is not enough to think of a thing. Mrs Addy. I am old. My wife has been dead for twenty years. If I can be of use — of any small use — I would like to be. I mean this. The stairs are long but I can still come down them. If you need a person at two in the morning, you will knock on the ceiling with a broom. Yes? That is all. Three times with the broom. I will come.' },
        { kind: 'narration', text: 'Mrs Addy is looking at the rug.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Thank you.' },
        { kind: 'narration', text: 'It comes out almost in a whisper.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Good.' },
        { kind: 'narration', text: 'Mr Dorji looks away, at the books, giving her a moment. After a while he says, in a more conversational voice:' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Niece. I have never met you. Tell me your aunt is well.' },
        { kind: 'narration', text: 'You tell him.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Good, good. She was at the convent school with my late wife. Did she tell you that? No, of course not. Your aunt does not tell people things. Well. My wife and your aunt were in the same year. I will leave it to your aunt to tell you the rest.' },
        { kind: 'narration', text: 'He smiles, for the first time, and it is a smile that changes his whole face — briefly making him look twenty years younger, the shape of the man he was.' },
        { kind: 'narration', text: 'You ask him, because it seems the right question, what he is reading these days.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Ah. Poetry. I have been reading poetry for three months. At a certain age one returns to poetry. There is a poem by Jibanananda Das — but I will not recite it at you, it is late and you will be walking home in the dark.' },
        { kind: 'narration', text: 'He reconsiders.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'No. It is short. I will recite only the first lines.' },
        { kind: 'narration', text: 'He closes his eyes. His voice, when he speaks the Bangla, is a different voice — older, more careful, the voice of a man reading aloud to himself at his writing desk. You do not understand the words. But you understand the shape of them, which is the shape of a person naming the evening, and the quietness of it, and a thing in the evening which will pass.' },
        { kind: 'narration', text: 'When he stops, no one speaks for a moment.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'That is the one about — about being alone in the house.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Yes. That one.' },
        { kind: 'narration', text: 'They look at each other. Something passes between them, some understanding that does not need to be made into words. You understand, watching, that these two people have been neighbors for twelve years, and that for twelve years Mr Dorji has been the quiet man upstairs, and that Mrs Addy has been the teacher downstairs, and that both of them have been, in different ways, in rooms by themselves. And that tonight, because the rent has come up with a niece in tow, they have spoken for the first time in some new way.' },
        { kind: 'narration', text: 'You feel, sitting there, that you should not be in the room.' },
        { kind: 'narration', text: 'You say you should be heading home. It is getting dark.' },
        { kind: 'dialogue', character: 'Mr Dorji', text: 'Yes. Of course. Niece. Thank you for visiting. Mrs Addy — the rent. Thank you. Three knocks. Remember.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'On the stairs, Mrs Addy is silent. At the bottom of the stairs, in her own small garden, she stops.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I did not know. That he had heard. I did not know.' },
        { kind: 'narration', text: 'You say nothing.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I thought I was crying privately. For three weeks. And all that time an old man upstairs was listening and deciding whether to come down.' },
        { kind: 'narration', text: 'She presses her hand to her mouth.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I am not — I am not sure what to do with that.' },
        { kind: 'narration', text: 'You say, tentatively, that perhaps she does not need to do anything with it. That perhaps he was only telling her that he was there.' },
        { kind: 'narration', text: 'Mrs Addy looks at you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Yes. Yes. Perhaps that is all. Thank you. That is — yes.' },
        { kind: 'narration', text: 'She walks you to the gate. At the gate she puts her hand on your arm, briefly.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Come on Wednesday. The usual day. Eleanor will be here. I would like you to be here also. I do not know exactly why. But I would like you to be here.' },
        { kind: 'narration', text: 'You say you will come.' },
        { kind: 'narration', text: 'You walk home. The town is almost entirely dark now. In several houses, lamps are being lit. You can see the shape of the ridge against the sky and, just visible above it, the first star. You think about Mr Dorji\'s voice reading the poem, and you think about Mrs Addy crying in a kitchen for three weeks while an old man sat above her with his hand on a door, and you think, though you cannot have said why you think it at this moment, about Eleanor, about her smile, about the way her eyes met yours in the kitchen and she made herself briefly more visible.' },
        { kind: 'narration', text: 'You are close, though you do not know it yet, to understanding.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'second_wednesday' }
      ]
    },
    second_wednesday: {
      blocks: [
        { kind: 'narration', text: 'You wake on Wednesday with the feeling of something already in the room — a thought that has been sitting at the foot of the bed while you slept. You cannot yet look at it directly. You get up. You make tea. Your aunt is already at her counter. You eat toast. All of this takes perhaps forty minutes, during which the thought remains at the edge of your mind, patient, not yet fully formed.' },
        { kind: 'narration', text: 'You walk up to Mrs Addy\'s at a quarter to eleven.' },
        { kind: 'narration', text: 'Thinley is leaving the house as you arrive. He passes you on the lane with his empty basket on his head and his shirt collar still turned up in the back, and he nods at you, which is more acknowledgment than he has given you before. He has begun to recognize you. He sings, this morning, a different film song. You do not know this one.' },
        { kind: 'narration', text: 'Mrs Hamida is already at the kitchen table. Eleanor is not yet there.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Kamala, another letter is gone. Yesterday.' },
        { kind: 'narration', text: 'Mrs Addy is at the counter, pouring boiling water into the teapot. She does not turn around.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I know. I checked this morning.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'What will you say to Eleanor?' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I do not know. Perhaps nothing. Perhaps I have decided I will wait a week longer, and see if the pattern continues.' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Kamala —' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Hamida. Please. I will decide during the tea. Let me decide during the tea.' },
        { kind: 'narration', text: 'Mrs Hamida subsides. Mrs Addy brings the teapot to the table. Her hands are very steady. The thought at the edge of your mind is no longer at the edge. You are aware, now, that you have been noticing something for several days, and you do not yet know what it is you have noticed, but you know it is close.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'At eleven, Eleanor arrives.' },
        { kind: 'narration', text: 'She is wearing a dark blue skirt today and the same grey cardigan with the mend on the elbow. Her face is thinner than it was on Saturday. It is, you realize, thinner in a particular way — not the way a person is thin who is simply old, but the way a person is thin who is losing weight without meaning to.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Darlings. I have brought figs. Local. From Sonia down at the corner. She had them this morning.' },
        { kind: 'narration', text: 'She places a small paper-wrapped parcel on the table.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor. Sit.' },
        { kind: 'narration', text: 'Eleanor sits. She looks at Mrs Addy. Mrs Addy is not looking at her.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala, is something wrong?' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'No. Yes. I do not know.' },
