        { kind: 'narration', text: 'Mrs Addy sits down, then stands up again, then sits down.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Have some tea. Have a biscuit. We should — I have been thinking, Eleanor. I have been thinking for three weeks.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'About what, dear?' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'About —' },
        { kind: 'narration', text: 'Mrs Addy stops. Her hands are on her teacup. She is looking at them.' },
        { kind: 'narration', text: 'The kitchen is very quiet.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'And in that quietness — in the small suspended moment in which Mrs Addy is trying to form her sentence — you understand.' },
        { kind: 'narration', text: 'It arrives complete, the way an answer arrives when it has been just beneath the surface of your mind for days. You understand, first, that Eleanor was in Simla in 1949 and 1950. You understand this because on Saturday she mentioned, in passing, a typewriter ribbon from Siliguri, and a bus ride, and somewhere in the bus-ride story she had said, almost as an aside, *that was the route I took to my sister\'s when we lived in Simla, oh, years ago*. You had not registered the sentence at the time. Now you remember it.' },
        { kind: 'narration', text: 'You understand, second, that Eleanor\'s glance at Mrs Addy — the brief one she made on Saturday when Mrs Addy was staring at her cake — was not the glance of a guest looking at her host. It was the glance of a person who has known another person for forty years and is checking, without wanting to be seen checking, whether that person is all right.' },
        { kind: 'narration', text: 'You understand, third, that Eleanor is dying.' },
        { kind: 'narration', text: 'You understand, fourth — and this is the part that arrives with a small cold feeling in your chest — that Eleanor loved Joseph Addy. Perhaps not in the way Kamala loved him. Perhaps in a way that had no name, because they had been careful, both of them, their whole lives, not to let it have a name. But she had loved him. And she had written to him, in Simla, all those months, in small letters that he had kept because he was the kind of man who kept things.' },
        { kind: 'narration', text: 'You understand, fifth, that Eleanor has been coming into this house for thirty years, and that on Wednesday afternoons when Kamala goes to the market Eleanor sometimes stays a little longer, and that three weeks ago — when her illness had become such that she could feel the shape of the time remaining — she had come up alone, and had knelt by the box under Kamala\'s bed, and had taken the first letter.' },
        { kind: 'narration', text: 'You understand, sixth, that the letters are not Kamala\'s letters at all. They are Eleanor\'s letters. They were written by Joseph to Eleanor. They have been, accidentally, in the wrong box for forty years.' },
        { kind: 'narration', text: 'You understand all of this in perhaps two seconds.' },
        { kind: 'narration', text: 'You do not speak. You do not move.' },
        { kind: 'narration', text: 'And you see, in the same two seconds, that Eleanor has been watching you. That she saw something change in your face. That she has understood that you have understood.' },
        { kind: 'narration', text: 'Her eyes do not leave yours.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'Mrs Addy, who has been staring at her own teacup, begins to speak.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor, I —' },
        { kind: 'narration', text: 'And Eleanor, without looking away from you, says quietly:' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala. Wait. Please wait.' },
        { kind: 'narration', text: 'Mrs Addy looks up.' },
        { kind: 'narration', text: 'Eleanor is still looking at you. Her eyes are very blue, and there is a great deal in them — more than you expect to see in a person\'s eyes in an ordinary kitchen on an ordinary Wednesday. Sorrow. A very old sorrow. And something else, which you recognize, after a moment, as *gratitude*.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala. I have something to tell you. I should have told you a long time ago. I have not told you because I was a coward, and because I loved you, and because I did not know how to say it without breaking something. But I have come to an age where not telling you would be worse.' },
        { kind: 'narration', text: 'Now she looks at Kamala.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'The letters that have been missing from your box. I have been taking them. I took them, one at a time, on Wednesday afternoons when you went to the market. I am very sorry.' },
        { kind: 'narration', text: 'Mrs Addy does not say anything. Her hand is on her cup. Her face does not change.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala. May I tell you the rest.' },
        { kind: 'narration', text: 'After a long moment, Mrs Addy nods.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'In 1949 and 1950. My sister was in Simla. Her husband\'s posting. I went to stay with her for most of those two years. I was — I was between things. I was not well. She thought the hills would help. I spent most of my time at the library, at Gorton Castle. That was where I met Joseph again.' },
        { kind: 'narration', text: '*Again*, you think. Not *met*. *Met again*.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'We had known each other in Calcutta before you and he were married, Kamala. I expect you know this. We were in the same set for one year, 1938, when we were all twenty. Nothing ever happened. You and he met in 1940, and I was glad for you both. I loved Joseph, then, a little. But I loved you too, and I was careful, and nothing was ever said, and I went to Siliguri to teach, and he went to Kolkata to work, and life happened. I had not seen him in eight years by the time we met at Gorton Castle. Neither of us was expecting the other. We spent the afternoons of those two years reading, mostly, at the same table. We walked, sometimes. We never did anything, Kamala. We never did a single thing. I want you to know that.' },
        { kind: 'narration', text: 'Mrs Addy is still looking at her. Her face is very still.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'But we wrote to each other, through those months, little notes. Because we were careful. Because we did not want to be seen together often. The library was very public. The notes were private. Small, careful letters. I kept his. When I left Simla at the end of 1950, I thought that would be the end of it. And I believe he thought so too. He did not know — he could not have known — that he had, by some small mistake, folded some of my letters into the envelopes with his letters to you. That is what happened. I am certain. Joseph was a thoughtful man, but he was not organized. He kept papers in piles. He would have put the afternoon\'s correspondence all together and mailed some to you and some to no one and some to me, and in the confusion a few of mine ended up with yours.' },
        { kind: 'narration', text: 'Eleanor pauses. She takes a sip of tea, which has gone cold.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I did not know this until — until a month after he died. You remember. You asked me to help you sort the box. We sat on your bed. I opened the first bundle. And I saw, inside one of his letters to you, a letter of mine. My handwriting. And I did not know what to do. You were crying. You had just buried him. You did not need to know, in that moment, that a letter from me to your husband had been in your box for ten years. So I closed the bundle and I said nothing. And I told myself I would come back later, when you were stronger, and I would tell you. But I did not come back. I let a year pass. Then another. Then it had been so long that telling you would have been worse than not telling you. Or so I thought. I have thought this for eleven years.' },
        { kind: 'narration', text: 'She looks at her hands.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Three weeks ago, my doctor told me the cancer is in my liver. He did not tell me exactly how long. But he told me enough. I thought — I thought first about what I had not finished, what I still needed to do. The letters came back to me. They have been in my mind, on and off, for eleven years. They were in a box under your bed. And I thought: I cannot die with them there. I cannot have you find them, after I am gone, when there is no one to explain. I cannot leave you with that discovery.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You could have told me.' },
        { kind: 'narration', text: 'Her voice is very thin.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I could have. I was afraid. I chose the worse way. I decided to take them back, a few at a time, so that you would not notice. And so that when I died, you would have — you would have your letters, and nothing else.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'But I did notice.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Yes. I did not know you would open the box. I had thought — I had thought you never opened it. It had a dust on it. It had had a dust for years. I was wrong.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I opened it because I had been thinking about Joseph. That morning. I had been missing him. And I thought I would read one of his letters.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Yes. I did not know.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I know, Kamala. I know. I am — I am very sorry.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'The kitchen is very quiet. Mrs Hamida, you realize, has not moved the whole time. Her hands are folded in her lap. She is staring at the teapot.' },
        { kind: 'narration', text: 'Mrs Addy, at last, looks at Eleanor.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You loved him.' },
        { kind: 'narration', text: 'Not a question.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Yes.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'All those years.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'A small amount, Kamala. A small amount, carefully. Not the way you did. Never that way.' },
        { kind: 'narration', text: 'Mrs Addy closes her eyes. A tear slides down her cheek. She does not seem to notice it.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I wish you had told me.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I wish I had told you also.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I wish — I wish you had told me last month. Before this. When you first knew you were ill. I wish you had come here and said, *Kamala, there is something I should have told you years ago.* I would have — I would have been shocked, Eleanor. But I would have understood. I would have understood.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'I know you would have.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Then why.' },
        { kind: 'narration', text: 'Eleanor is silent for a long time.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Because I was ashamed. For eleven years I was ashamed. And shame is an old habit. It does not know how to break itself.' },
        { kind: 'narration', text: 'Mrs Addy, very slowly, reaches across the table. She places her hand over Eleanor\'s. Eleanor looks down at the two hands. She does not move her own.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You should have had them. All along. They were not mine.' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'They were in your box, Kamala.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'They were not mine.' },
        { kind: 'narration', text: 'Eleanor\'s face, which has held composure for the whole of this conversation, begins finally to break. Not in any large way. The corners of her mouth tighten. Her breathing shortens. She does not take her hand away.' },
        { kind: 'narration', text: 'After a long time, Mrs Addy says:' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You will come on Wednesday. Next Wednesday. And the Wednesday after. As long as you can come. Yes?' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Kamala —' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Yes?' },
        { kind: 'dialogue', character: 'Mrs Wright', text: 'Yes. As long as I can come.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'They sit at the table. Mrs Hamida has begun to cry quietly, into her cardigan. Outside the kitchen window, the town makes its small Wednesday sounds. Somewhere down the lane a dog barks, twice, and then is silent.' },
        { kind: 'narration', text: 'You realize, after a while, that you should go. This is no longer, and perhaps has not been for some minutes, a conversation for you.' },
        { kind: 'narration', text: 'You stand up quietly. Mrs Addy looks at you. Her eyes are full of tears but her mouth, very slightly, forms something like a smile of thanks. Eleanor, beside her, nods once at you — the smallest nod, but a complete one.' },
        { kind: 'narration', text: 'You go.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'On the lane outside, the afternoon is bright. You walk down to the main road and you do not go home. You walk past the post office and up the path to the viewpoint, the one you have climbed three times now. The ridge is visible in its entirety. Three ranges of mountains recede into India. You sit on the stone bench at the top and you do not cry, exactly, but you sit for a long time with your hands on your knees, and you understand, sitting there, that you have just been in the presence of something that has very little to do with you, and that you had been asked to be present for it not because you were needed but because being a stranger is sometimes a gift, because a stranger holds things that cannot be held by people too close to them.' },
        { kind: 'narration', text: 'When the sun begins to drop behind the nearer ridge, you walk back down.' },
        { kind: 'pause', weight: 3 },
        { kind: 'transition', to: 'after' }
      ]
    },
    after: {
      blocks: [
        { kind: 'narration', text: 'The rest of your three weeks in the town pass quietly.' },
        { kind: 'narration', text: 'You do not go back to Mrs Addy\'s the next morning. It does not seem right to go. On Friday afternoon Mrs Hamida comes to the post office and sits across from you at the counter for half an hour, not saying much. She tells you Kamala has spent the day in Eleanor\'s small sitting room. The two of them have been together since morning. Hamida does not know what they are saying. She was not asked to be there. She is neither hurt nor surprised by this; she understands that what Kamala and Eleanor are doing together this afternoon is a thing that requires only two people.' },
        { kind: 'narration', text: 'Before Mrs Hamida leaves, she says:' },
        { kind: 'dialogue', character: 'Mrs Hamida', text: 'Kamala asked me to tell you that she will see you on Sunday, if you are free. Only for a short visit. She would like to thank you.' },
        { kind: 'narration', text: 'You say you are free.' },
        { kind: 'narration', text: 'On Saturday the town has a small festival that you had not known was coming, and the streets are full of stalls, and you help your aunt with a late rush at the post office — parcels going to relatives in Calcutta, stamps purchased by visiting families — and you do not think about Mrs Addy very much.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'On Sunday afternoon you walk up to the house.' },
        { kind: 'narration', text: 'The door is open. Kamala is in the kitchen. She is arranging flowers in a low brass bowl — small white ones, not a formal arrangement, just flowers that have been picked from her garden and brought in. When she sees you she does not stand up.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Sit.' },
        { kind: 'narration', text: 'You sit. She finishes the flowers. Then she looks at you, and you see that she looks — she looks different. Not happier. But a weight has gone. The weight that had been visible on her face for three weeks.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Eleanor has moved to my sister\'s house. Not Deepa. Another sister, who lives in Gangtok. Eleanor\'s sister is there. She will be cared for there. It is not far. I will go to see her at the end of the month, and perhaps again after that. She has perhaps three months, her doctor said. Perhaps less.' },
        { kind: 'narration', text: 'You say you are sorry.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Yes. So am I. I would have liked more time. But we have been given some time. That is more than a great many people are given. I am — I am making myself remember that.' },
        { kind: 'narration', text: 'She looks at her hands.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I wanted to thank you. For coming. I know Hamida brought you and I know you did not know what you were walking into. Neither did I, really. But you — you were the one who —' },
        { kind: 'narration', text: 'She stops. She considers.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'You did not speak on Wednesday. When Eleanor was telling me. You did not ask questions. You did not make yourself part of it. You sat. And when the time came you stood up and left. That is a very difficult thing to do well, and you did it well. I do not know that I would have done it well at your age.' },
        { kind: 'narration', text: 'You say you did not know what else to do.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Yes. But not knowing what else to do is sometimes exactly the right thing.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'She gets up. She goes into the other room and comes back with the blue tin box. She sets it on the table.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I want to show you something.' },
        { kind: 'narration', text: 'She opens the box. Inside, the letters are arranged as they have been arranged for eleven years. She takes out several bundles.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I went through all of them again, after Eleanor left on Wednesday. The whole box, every letter. It took me all night and all Thursday. I read each one. I was looking for — I was looking for any letter that was not Joseph to me. Any letter that had been folded in by mistake and that Eleanor had missed.' },
        { kind: 'narration', text: 'She looks at you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'There were four. Four letters I had never seen before. Four that were addressed to her, not to me. Four that Joseph had written to her in those months in Simla. I read them.' },
        { kind: 'narration', text: 'She pauses. She looks at the box.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'They were beautiful letters. They were beautiful, careful letters. He wrote to her about the library. He wrote to her about the weather. He wrote to her about the books they were reading. He wrote her almost exactly the kind of letters he wrote to me, which I had thought were only for me, and which now I understand were — were the way he loved people, both of us and perhaps others, not less because there were others but perhaps even more. I do not know.' },
        { kind: 'narration', text: 'She folds her hands.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'On Thursday afternoon I took the four letters to Eleanor\'s house. I put them in her hands. She read them. We sat for an hour and did not speak. Then I came home.' },
        { kind: 'narration', text: 'She closes the box.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I have thought a great deal these last few days. About what it means that Joseph was not exactly the man I thought he was. And about what it means that Eleanor was not exactly the friend I thought she was. And about what it means that I have been, for forty years, a woman who knew both of them less completely than I believed I did. These are — these are not pleasant thoughts. But they are not, in the end, unbearable thoughts. I had expected them to be unbearable. They are not.' },
        { kind: 'narration', text: 'She looks up at you.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'I think the reason they are not unbearable is this: Joseph loved me. That was not a lie. Eleanor loved me. That was also not a lie. The thing that was hidden between them did not subtract from the things that were not hidden from me. It only — it only added a thing I had not known. And having known it now, I find — I find I can love both of them still. A little sadder. A little older. But still.' },
        { kind: 'narration', text: 'You do not say anything. There is nothing to say.' },
        { kind: 'narration', text: 'After a moment Kamala picks up the brass bowl of white flowers and carries it to the windowsill. She sets it down. She looks out the window at the lane.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'The box is going upstairs now, where it belongs. But I am not putting it back under the bed. It can sit on the cupboard, where I can see it. I do not need to hide it anymore. There is nothing left in it that I do not know about.' },
        { kind: 'narration', text: 'She comes back to the table. She puts one hand, briefly, on yours.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Thank you. For the Saturday, and the cake, and the Wednesday. For the Wednesday especially. Go back to your aunt. Tell her I am well. Tell her I will come down to the post office in a week or two. Tell her I will bring her a loaf of that bad cake she likes to hear about.' },
        { kind: 'narration', text: 'You tell her you will.' },
        { kind: 'narration', text: 'At the door you turn. Mrs Addy is back at the flowers on the windowsill, adjusting one that has drooped slightly.' },
        { kind: 'dialogue', character: 'You', text: 'Mrs Addy.' },
        { kind: 'dialogue', character: 'Mrs Addy', text: 'Mm.' },
        { kind: 'dialogue', character: 'You', text: 'The box. Thank you for letting me see it.' },
        { kind: 'narration', text: 'She does not turn around. But she nods, and you can see, from the angle, that she is smiling a small, private smile.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You walk out into the afternoon.' },
        { kind: 'narration', text: 'On the lane, as you come down toward the road, you see a dog ahead of you. A grey dog with one ear that stands up. It is walking slowly, in the middle of the lane, in the direction of the main road. It is not in any hurry. It looks back once, over its shoulder, at you — a long, considering look — and then it continues walking. You follow it, not closely, at the pace it has set.' },
        { kind: 'narration', text: 'At the road, it turns left. You turn right, toward the post office.' },
        { kind: 'narration', text: 'It is, you realize, the same dog you have seen three times in this town. And it is not.' },
        { kind: 'narration', text: 'It is Pepa. And it is not.' },
        { kind: 'narration', text: 'It is some other dog, entirely ordinary, that has happened to resemble her at the angles at which you have seen it.' },
        { kind: 'pause', weight: 2 },
        { kind: 'narration', text: 'You walk home in the evening light. Above the town, the ridge holds its last line of gold. Below, the valley is already in shadow. Somewhere on the main road, a bell is ringing — the bell of the shop that has the new tea — and somewhere else a child is being called in for dinner.' },
        { kind: 'narration', text: 'You have been in this town twenty-two days.' },
        { kind: 'narration', text: 'You will be in it a few more.' },
        { kind: 'narration', text: 'Then you will go home, and you will tell parts of this to people who will not entirely understand it, and parts of it you will not tell, because there are parts of other people\'s lives that do not belong to you to hand on. But some of it you will carry with you, for a long time. The smell of the tea. The blue cotton of Mrs Addy\'s kurta. The mend on the elbow of Eleanor\'s grey cardigan. The voice of Mr Dorji reading a poem in a language you did not understand, in a room full of books. The gold ring on Mrs Hamida\'s hand. The laugh of a vegetable boy on a morning when no one had known they were being watched.' },
        { kind: 'narration', text: 'And the letters. You will think, sometimes, about the letters.' },
        { kind: 'pause', weight: 3 },
        { kind: 'ending', id: 'inquirer_complete' }
      ]
    }
  }
};

  return 'inquirer_complete';
}

// Idle rotation
// IDLE_BEHAVIORS is now chosen per-cycle by pickIdleBehavior() 
// (weighted random — Kit mostly sleeps, occasionally wakes, rarely stretches)
let idleTimer = null;

function startIdleRotation() {
  stopIdleRotation();
  const cycle = () => {
    if (!bubble.classList.contains('open')) {
      const behavior = pickIdleBehavior();
      setKitAnimation(behavior);
    }
    // Longer intervals between behavior changes — Kit is mostly sleeping
    idleTimer = setTimeout(cycle, 15000 + Math.random() * 20000);
  };
  // Start sleeping
  setKitAnimation('sleep');
  // First behavior change after 20-40 seconds
  idleTimer = setTimeout(cycle, 20000 + Math.random() * 20000);
}

function pickIdleBehavior() {
  // Weighted random:
  //   sleep: 60% (default — Kit is mostly sleeping)
  //   sit / sit_facing_user: 25% (normal awake state, less often)
  //   lie_down: 10% (awake but resting)
  //   stretch (yawn): 5% (rare)
  const r = Math.random();
  if (r < 0.60) return 'sleep';
  if (r < 0.85) return Math.random() < 0.5 ? 'sit' : 'sit_facing_user';
  if (r < 0.95) return 'lie_down';
  return 'yawn';  // used as a stretch — cat-yawn = body stretch
}

function stopIdleRotation() {
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
}

// ============ GLOBAL STATE ============
// Tracks which story is active, state within that story, and last-played time.

class GlobalState {
  constructor() {
    this.activeStory = null;
    this.perStory = {};  // { story_id: { scene, blockIndex, texture, lastPlayed } }
    this.history = {};   // { story_id: [ ... recent blocks ... ] }
    this.load();
  }
  
  load() {
    try {
      const saved = localStorage.getItem(STATE_KEY);
      if (saved) {
        const s = JSON.parse(saved);
        this.activeStory = s.activeStory || null;
        this.perStory = s.perStory || {};
        this.bookmarks = s.bookmarks || {};
        this.completions = s.completions || {};
      } else {
        this.bookmarks = {};
        this.completions = {};
      }
      const savedHistory = localStorage.getItem(HISTORY_KEY);
      if (savedHistory) this.history = JSON.parse(savedHistory);
    } catch (e) {
      this.bookmarks = {};
      this.completions = {};
    }
  }
  
  save() {
    try {
      localStorage.setItem(STATE_KEY, JSON.stringify({
        activeStory: this.activeStory,
        perStory: this.perStory,
        bookmarks: this.bookmarks,
        completions: this.completions
      }));
      localStorage.setItem(HISTORY_KEY, JSON.stringify(this.history));
    } catch (e) {}
  }
  
  getStoryState(storyId) {
    if (!this.perStory[storyId]) {
      const storyDef = STORIES[storyId];
      this.perStory[storyId] = {
        scene: null,
        blockIndex: 0,
        texture: { ...storyDef.story.texture },
        lastPlayed: null
      };
    }
    return this.perStory[storyId];
  }
  
  getHistory(storyId) {
    if (!this.history[storyId]) this.history[storyId] = [];
    return this.history[storyId];
  }
  
  pushToHistory(storyId, block) {
    if (block.kind !== 'narration' && block.kind !== 'dialogue') return;
    const h = this.getHistory(storyId);
    const copy = { kind: block.kind, text: block.text };
    if (block.character) copy.character = block.character;
    h.push(copy);
    if (h.length > 4) h.shift();
    this.save();
  }
  
  resetStory(storyId) {
    delete this.perStory[storyId];
    delete this.history[storyId];
    this.save();
  }
  
  setBookmark(storyId, scene, blockIndex) {
    this.bookmarks[storyId] = { scene, blockIndex, timestamp: Date.now() };
    this.save();
  }
  
  clearBookmark(storyId) {
    delete this.bookmarks[storyId];
    this.save();
  }
  
  getBookmark(storyId) {
    return this.bookmarks[storyId] || null;
  }
  
  markCompleted(storyId) {
    this.completions[storyId] = { at: Date.now() };
    this.save();
  }
  
  hasCompleted(storyId) {
    return !!this.completions[storyId];
  }
}

const globalState = new GlobalState();

// ============ STORY RUNNER ============

class StoryRunner {
  constructor(storyId) {
    this.storyId = storyId;
    this.storyDef = STORIES[storyId];
    this.story = this.storyDef.story;
    this.state = globalState.getStoryState(storyId);
    this.isInRecap = false;
    this.previousState = null;
    this.autoPauseTimer = null;
  }
  
  snapshotState() {
    this.previousState = {
      scene: this.state.scene,
      blockIndex: this.state.blockIndex,
      texture: { ...this.state.texture }
    };
  }
  
  canGoBack() {
    return this.previousState !== null;
  }
  
  goBack() {
    if (!this.previousState) return;
    if (this.autoPauseTimer) { clearTimeout(this.autoPauseTimer); this.autoPauseTimer = null; }
    this.state.scene = this.previousState.scene;
    this.state.blockIndex = this.previousState.blockIndex;
    this.state.texture = { ...this.previousState.texture };
    this.previousState = null;
    const history = globalState.getHistory(this.storyId);
    if (history.length > 0) history.pop();
    this.saveStoryState();
    this.render();
  }
  
  toggleBookmark() {
    const existing = globalState.getBookmark(this.storyId);
    const here = existing && 
                 existing.scene === this.state.scene && 
                 existing.blockIndex === this.state.blockIndex;
    
    if (here) {
      globalState.clearBookmark(this.storyId);
    } else {
      globalState.setBookmark(this.storyId, this.state.scene, this.state.blockIndex);
    }
    this.updateBookmarkButtonState();
  }
  
  updateBookmarkButtonState() {
    const btn = document.getElementById('bookmarkBtn');
    if (!btn) return;
    const bm = globalState.getBookmark(this.storyId);
    const here = bm && 
                 bm.scene === this.state.scene && 
                 bm.blockIndex === this.state.blockIndex;
    if (here) {
      btn.classList.add('active');
      btn.textContent = '✓ bookmarked';
    } else {
      btn.classList.remove('active');
      btn.textContent = '+ bookmark';
    }
  }
  
  saveStoryState() {
    this.state.lastPlayed = Date.now();
    globalState.save();
  }
  
  currentScene_data() {
    return this.story.scenes[this.state.scene];
  }
  
  currentBlock() {
    const scene = this.currentScene_data();
    if (!scene) return null;
    return scene.blocks[this.state.blockIndex];
  }
  
  start() {
    if (!this.state.scene) {
      // First time — begin at the first scene
      const firstScene = Object.keys(this.story.scenes)[0];
      this.state.scene = firstScene;
      this.state.blockIndex = 0;
      this.saveStoryState();
      this.render();
      return;
    }
    
    const now = Date.now();
    const timeSince = this.state.lastPlayed ? (now - this.state.lastPlayed) : 0;
    const FIFTEEN_MIN = 15 * 60 * 1000;
    const ONE_DAY = 24 * 60 * 60 * 1000;
    
    if (timeSince < FIFTEEN_MIN || !this.state.lastPlayed) {
      this.render();
    } else if (timeSince < ONE_DAY) {
      this.renderResumeRecap(2, false);
    } else {
      this.renderResumeRecap(3, true);
    }
  }
  
  renderResumeRecap(n, longGap) {
    bubbleContent.innerHTML = '';
    
    const header = document.createElement('div');
    header.className = 'recap-header';
    if (longGap) {
      header.textContent = 'you return. the village is still there.';
    } else {
      header.textContent = 'where you were...';
    }
    bubbleContent.appendChild(header);
    
    const history = globalState.getHistory(this.storyId);
    const recent = history.slice(-n);
    
    recent.forEach((block, idx) => {
      const div = document.createElement('div');
      div.className = 'block recap';
      if (idx === recent.length - 1) div.classList.add('current-marker');
      
      if (block.kind === 'narration') {
        div.innerHTML = applyEmphasis(escapeHtml(block.text));
      } else if (block.kind === 'dialogue') {
        const name = document.createElement('span');
        name.className = 'character-name';
        name.textContent = block.character;
        const text = document.createElement('div');
        text.className = 'dialogue-text';
        text.innerHTML = '&ldquo;' + applyEmphasis(escapeHtml(block.text)) + '&rdquo;';
        div.appendChild(name);
        div.appendChild(text);
      }
      bubbleContent.appendChild(div);
    });
    
    const continueP = document.createElement('div');
    continueP.className = 'recap-header';
    continueP.style.marginTop = '1.5em';
    continueP.style.borderBottom = 'none';
    continueP.style.borderTop = '1px dashed rgba(183, 151, 110, 0.3)';
    continueP.style.paddingTop = '0.8em';
    continueP.textContent = 'click anywhere to continue';
    bubbleContent.appendChild(continueP);
    
    bubbleContent.classList.add('advance-ready');
    this.isInRecap = true;
    advanceIndicator.classList.add('visible');
  }
  
  advance() {
    if (this.isInRecap) {
      this.isInRecap = false;
      this.render();
      return;
    }
    
    if (this.autoPauseTimer) { clearTimeout(this.autoPauseTimer); this.autoPauseTimer = null; }
    
    const scene = this.currentScene_data();
    if (!scene) return;
    
    this.snapshotState();
    
    const current = scene.blocks[this.state.blockIndex];
    if (current && current.goto) {
      const idx = scene.blocks.findIndex(b => b.id === current.goto);
      if (idx >= 0) {
        this.state.blockIndex = idx;
        this.saveStoryState();
        this.render();
        return;
      }
    }
    
    this.state.blockIndex++;
    this.saveStoryState();
    this.render();
  }
  
  chooseOption(option) {
    this.snapshotState();
    
    if (option.effect) {
      for (const [key, value] of Object.entries(option.effect)) {
        this.state.texture[key] = (this.state.texture[key] || 0) + value;
      }
    }
    
    if (option.goto_scene) {
      this.state.scene = option.goto_scene;
      this.state.blockIndex = 0;
    } else if (option.next) {
      const scene = this.currentScene_data();
      const idx = scene.blocks.findIndex(b => b.id === option.next);
      if (idx >= 0) this.state.blockIndex = idx;
      else this.state.blockIndex++;
    } else {
      this.state.blockIndex++;
    }
    
    this.saveStoryState();
    this.render();
  }
  
  render() {
    bubbleContent.innerHTML = '';
    this.isInRecap = false;
    
    if (!this.state.scene) {
      const firstScene = Object.keys(this.story.scenes)[0];
      this.state.scene = firstScene;
      this.state.blockIndex = 0;
    }
    
    const block = this.currentBlock();
    
    if (!block) {
      this.renderEndScreen('unknown');
      return;
    }
    
    if (block.kind === 'transition') {
      if (block.to === 'SELECT_ENDING') {
        const endingScene = this.storyDef.selectEnding(this.state.texture);
        this.state.scene = endingScene;
        this.state.blockIndex = 0;
        this.saveStoryState();
        this.render();
        return;
      }
      this.state.scene = block.to;
      this.state.blockIndex = 0;
      this.saveStoryState();
      this.render();
      return;
    }
    
    if (block.kind === 'ending') {
      this.renderEndScreen(block.id);
      return;
    }
    
    globalState.pushToHistory(this.storyId, block);
    this.renderBlock(block);
    
    if (block.kind === 'choice') {
      this.renderChoice(block);
      bubbleContent.classList.remove('advance-ready');
      advanceIndicator.classList.remove('visible');
    } else if (block.kind === 'pause') {
      // Auto-advance pauses — no click required
      bubbleContent.classList.remove('advance-ready');
      advanceIndicator.classList.remove('visible');
      const weight = block.weight || 1;
      const pauseMs = 600 + weight * 500;
      this.autoPauseTimer = setTimeout(() => {
        this.advance();
      }, pauseMs);
    } else {
      bubbleContent.classList.add('advance-ready');
      setTimeout(() => advanceIndicator.classList.add('visible'), 400);
    }
    
    // Update bookmark button state for this block
    this.updateBookmarkButtonState();
    
    if (bubble.classList.contains('open')) {
      setKitAnimation('sit_facing_user');
    }
    
    const _backBtn = document.getElementById('backOneBtn');
    if (_backBtn) {
      if (this.canGoBack() && !this.isInRecap) {
        _backBtn.classList.remove('hidden');
      } else {
        _backBtn.classList.add('hidden');
      }
    }
  }
  
  renderBlock(block) {
    if (block.kind === 'narration') {
      const div = document.createElement('div');
      div.className = 'block narration';
      div.innerHTML = applyEmphasis(escapeHtml(block.text)).replace(/\n/g, '<br>');
      bubbleContent.appendChild(div);
      scrollToBottom();
    } else if (block.kind === 'dialogue') {
      const div = document.createElement('div');
      div.className = 'block dialogue';
      const name = document.createElement('span');
      name.className = 'character-name';
      name.textContent = block.character;
      const text = document.createElement('div');
      text.className = 'dialogue-text';
      text.innerHTML = '&ldquo;' + applyEmphasis(escapeHtml(block.text)) + '&rdquo;';
      div.appendChild(name);
      div.appendChild(text);
      bubbleContent.appendChild(div);
      scrollToBottom();
    } else if (block.kind === 'pause') {
      const div = document.createElement('div');
      div.className = 'block auto-pause weight-' + (block.weight || 1);
      div.textContent = '\u00b7 \u00b7 \u00b7';
      bubbleContent.appendChild(div);
      scrollToBottom();
    }
  }
  
  renderChoice(block) {
    if (block.style === 'inline') {
      const div = document.createElement('div');
      div.className = 'block narration';
      let html = applyEmphasis(escapeHtml(block.prompt));
      
      block.options.forEach((opt, idx) => {
        const pattern = `[${opt.text}]`;
        const escapedPattern = escapeHtml(pattern);
        const safeText = escapeHtml(opt.text);
        const replacement = `<a class="choice-inline" data-idx="${idx}" role="button" tabindex="0">${safeText}</a>`;
        html = html.replace(escapedPattern, replacement);
      });
      
      div.innerHTML = html;
      bubbleContent.appendChild(div);
      
      div.querySelectorAll('.choice-inline').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(el.dataset.idx, 10);
          div.querySelectorAll('.choice-inline').forEach((other, otherIdx) => {
            if (otherIdx === idx) other.classList.add('chosen');
            else other.classList.add('faded');
          });
          setTimeout(() => this.chooseOption(block.options[idx]), 500);
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
        });
      });
      
      scrollToBottom();
    } else if (block.style === 'menu') {
      const pauseMs = (block.pauseBefore || 1) * 400;
      setTimeout(() => {
        const menu = document.createElement('div');
        menu.className = 'choice-menu';
        block.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'choice-option';
          btn.textContent = opt.text;
          btn.addEventListener('click', () => this.chooseOption(opt));
          menu.appendChild(btn);
        });
        bubbleContent.appendChild(menu);
        scrollToBottom();
      }, pauseMs);
    }
  }
  
  renderEndScreen(endingId) {
    // Mark story as completed (unless it's a WIP teaser ending)
    const isTendingTeaser = (endingId === 'tending_in_progress');
    if (!isTendingTeaser) {
      globalState.markCompleted(this.storyId);
    }
    
    const div = document.createElement('div');
    div.className = 'end-screen';
    
    if (isTendingTeaser) {
      const storyTitle = this.story.meta.title;
      div.innerHTML = `
        <h2>a pause, not an ending</h2>
        <p><em>${escapeHtml(storyTitle)}</em> will continue in a future update.</p>
        <p>Thank you for visiting. Everything you saw will still be here when you return.</p>
        <button class="restart" id="backToStoriesBtn">return to the stories</button>
      `;
    } else {
      div.innerHTML = `
        <h2>end of this morning</h2>
        <p>you have reached the close of <em>${escapeHtml(this.story.meta.title)}</em>.</p>
        <p>thank you for visiting.</p>
        <div class="begin-options">
          <button class="begin-option" id="restartBtn">begin again</button>
          <button class="begin-option secondary" id="revisitSceneBtn">revisit a moment</button>
          <button class="begin-option secondary" id="endBackToStoriesBtn">return to the stories</button>
        </div>
      `;
    }
    
    bubbleContent.appendChild(div);
    bubbleContent.classList.remove('advance-ready');
    advanceIndicator.classList.remove('visible');
    
    const restartBtn = document.getElementById('restartBtn');
    if (restartBtn) {
      restartBtn.addEventListener('click', () => {
        // If there's a bookmark, offer to start from it
        const bm = globalState.getBookmark(this.storyId);
        if (bm) {
          this.showBeginAgainOptions();
        } else {
          globalState.resetStory(this.storyId);
          this.state = globalState.getStoryState(this.storyId);
          this.start();
        }
      });
    }
    const backBtn = document.getElementById('backToStoriesBtn');
    if (backBtn) {
      backBtn.addEventListener('click', () => showStoryPicker());
    }
    const endBackBtn = document.getElementById('endBackToStoriesBtn');
    if (endBackBtn) {
      endBackBtn.addEventListener('click', () => showStoryPicker());
    }
    const revisitBtn = document.getElementById('revisitSceneBtn');
    if (revisitBtn) {
      revisitBtn.addEventListener('click', () => this.showRevisitPanel());
    }
  }
  
  showBeginAgainOptions() {
    bubbleContent.innerHTML = '';
    const bm = globalState.getBookmark(this.storyId);
    const div = document.createElement('div');
    div.className = 'end-screen';
    div.innerHTML = `
      <h2>where would you like to begin?</h2>
      <p>you have a bookmark from earlier.</p>
      <div class="begin-options">
        <button class="begin-option" id="fromBookmarkBtn">from the bookmark</button>
        <button class="begin-option secondary" id="fromStartBtn">from the beginning</button>
      </div>
    `;
    bubbleContent.appendChild(div);
    
    document.getElementById('fromBookmarkBtn').addEventListener('click', () => {
      // Reset texture but jump to bookmark
      this.state.texture = { ...this.story.texture };
      this.state.scene = bm.scene;
      this.state.blockIndex = bm.blockIndex;
      this.previousState = null;
      globalState.getHistory(this.storyId).length = 0;
      this.saveStoryState();
      this.render();
    });
    document.getElementById('fromStartBtn').addEventListener('click', () => {
      globalState.resetStory(this.storyId);
      globalState.clearBookmark(this.storyId);
      this.state = globalState.getStoryState(this.storyId);
      this.start();
    });
  }
  
  showRevisitPanel() {
    bubbleContent.innerHTML = '';
    bubbleContent.classList.remove('advance-ready');
    advanceIndicator.classList.remove('visible');
    
    const panel = document.createElement('div');
    panel.className = 'revisit-panel';
    
    const intro = document.createElement('div');
    intro.className = 'revisit-intro';
    intro.textContent = 'a moment to return to?';
    panel.appendChild(intro);
    
    const titles = SCENE_TITLES[this.storyId] || {};
    const sceneNames = Object.keys(this.story.scenes);
    
    sceneNames.forEach((sceneName, idx) => {
      const title = titles[sceneName] || sceneName;
      // Skip ending scenes in revisit unless visited (the played ending)
      const isEnding = sceneName.startsWith('ending_');
      if (isEnding && sceneName !== this.state.scene) {
        // Only show the ending the user actually reached
        return;
      }
      
      const btn = document.createElement('button');
      btn.className = 'revisit-scene';
      btn.innerHTML = `<span class="revisit-scene-number">${String(idx + 1).padStart(2, '0')}</span>${escapeHtml(title)}`;
      btn.addEventListener('click', () => {
        this.state.scene = sceneName;
        this.state.blockIndex = 0;
        this.previousState = null;
        globalState.getHistory(this.storyId).length = 0;
        this.saveStoryState();
        this.render();
      });
      panel.appendChild(btn);
    });
    
    // A back-to-stories option at the bottom
    const backBtn = document.createElement('button');
    backBtn.className = 'begin-option secondary';
    backBtn.style.marginTop = '20px';
    backBtn.textContent = '← return to the stories';
    backBtn.addEventListener('click', () => showStoryPicker());
    panel.appendChild(backBtn);
    
    bubbleContent.appendChild(panel);
  }
}

// ============ STORY PICKER ============

function showStoryPicker() {
  bubbleContent.innerHTML = '';
  bubbleContent.classList.remove('advance-ready');
  advanceIndicator.classList.remove('visible');
  storyTitle.textContent = 'Kit';
  backToMenuBtn.style.display = 'none';
  const _bb = document.getElementById('backOneBtn');
  if (_bb) _bb.classList.add('hidden');
  
  const picker = document.createElement('div');
  picker.className = 'story-picker';
  
  const intro = document.createElement('div');
  intro.className = 'picker-intro';
  intro.textContent = 'two stories are here. which one today?';
  picker.appendChild(intro);
  
  for (const [storyId, storyDef] of Object.entries(STORIES)) {
    const card = document.createElement('div');
    card.className = 'story-card';
    if (storyDef.status === 'in-progress') card.classList.add('in-progress');
    
    const title = document.createElement('div');
    title.className = 'story-card-title';
    title.textContent = storyDef.story.meta.title;
    card.appendChild(title);
    
    const subtitle = document.createElement('div');
    subtitle.className = 'story-card-subtitle';
    subtitle.textContent = storyDef.subtitle;
    card.appendChild(subtitle);
    
    const desc = document.createElement('div');
    desc.className = 'story-card-description';
    desc.textContent = storyDef.description;
    card.appendChild(desc);
    
    // Bookmark indicator
    if (globalState.getBookmark(storyId)) {
      const bm = document.createElement('div');
      bm.className = 'bookmark-indicator';
      bm.textContent = '• you have a bookmark';
      card.appendChild(bm);
    }
    // Completion indicator
    if (globalState.hasCompleted(storyId)) {
      const comp = document.createElement('div');
      comp.className = 'bookmark-indicator';
      comp.textContent = '• you have completed this one';
      card.appendChild(comp);
    }
    
    card.addEventListener('click', () => selectStory(storyId));
    picker.appendChild(card);
  }
  
  bubbleContent.appendChild(picker);
  
  globalState.activeStory = null;
  globalState.save();
}

let activeRunner = null;

function selectStory(storyId) {
  globalState.activeStory = storyId;
  globalState.save();
  
  activeRunner = new StoryRunner(storyId);
  const storyDef = STORIES[storyId];
  storyTitle.textContent = storyDef.story.meta.title;
  backToMenuBtn.style.display = 'inline-block';
  activeRunner.start();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    bubbleContent.scrollTop = bubbleContent.scrollHeight;
  });
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function applyEmphasis(escapedText) {
  let out = escapedText.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return out;
}

function openBubble() {
  bubble.classList.add('open');
  kitContainer.classList.add('bubble-open');
  kitHint.classList.remove('visible');
  setKitAnimation('sit_facing_user');
  stopIdleRotation();
  
  // Resume active story OR show picker
  if (globalState.activeStory && STORIES[globalState.activeStory]) {
    activeRunner = new StoryRunner(globalState.activeStory);
    const storyDef = STORIES[globalState.activeStory];
    storyTitle.textContent = storyDef.story.meta.title;
    backToMenuBtn.style.display = 'inline-block';
    activeRunner.start();
  } else {
    showStoryPicker();
  }
}

function closeBubble() {
  bubble.classList.remove('open');
  kitContainer.classList.remove('bubble-open');
  // Kit starts by sleeping again (the rotation will handle variation later)
  setKitAnimation('sleep');
  startIdleRotation();
  setTimeout(() => kitHint.classList.add('visible'), 1500);
}


// ============ AMBIENT INTERACTIONS ============

let cursorAwarenessActive = true;   // can disable during bubble-open
let lastCursorTime = 0;
let cursorNearKit = false;
let cursorAwarenessTimer = null;

function isCursorNearKit(mouseX, mouseY) {
  if (!kitContainer) return false;
  const rect = kitContainer.getBoundingClientRect();
  const kitCx = rect.left + rect.width / 2;
  const kitCy = rect.top + rect.height / 2;
  const dx = mouseX - kitCx;
  const dy = mouseY - kitCy;
  // "near" = within 280px
  return Math.sqrt(dx*dx + dy*dy) < 280;
}

document.addEventListener('mousemove', (e) => {
  if (!cursorAwarenessActive) return;
  if (bubble.classList.contains('open')) return;
  
  lastCursorTime = Date.now();
  const near = isCursorNearKit(e.clientX, e.clientY);
  
  if (near && !cursorNearKit) {
    cursorNearKit = true;
    // Kit notices the cursor — wakes up and turns to face
    stopIdleRotation();
    setKitAnimation('turn_to_camera');
  } else if (!near && cursorNearKit) {
    cursorNearKit = false;
    // Cursor left — Kit settles back toward sleep after a brief pause
    if (cursorAwarenessTimer) clearTimeout(cursorAwarenessTimer);
    cursorAwarenessTimer = setTimeout(() => {
      if (!cursorNearKit && !bubble.classList.contains('open')) {
        // Briefly show idle (awake, relaxing) before going back to sleep rotation
        setKitAnimation('idle');
        // After another moment, return to the full rotation (which mostly picks sleep)
        setTimeout(() => {
          if (!cursorNearKit && !bubble.classList.contains('open')) {
            startIdleRotation();
          }
        }, 3000);
      }
    }, 1500);
  }
});

// ============ DOUBLE-CLICK YAWN ============
// Detect double-click specifically (distinct from single click)
// Double-click = two clicks within 400ms

function handleKitClick() {
  if (bubble.classList.contains('open')) return;
  
  // Single click — Kit wakes up (click_response), then bubble opens
  setKitAnimation('click_response');
  setTimeout(openBubble, 500);
}

kitContainer.addEventListener('click', (e) => {
  e.preventDefault();
  handleKitClick();
});

kitContainer.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    handleKitClick();
  }
});

closeBtn.addEventListener('click', closeBubble);
backToMenuBtn.addEventListener('click', () => {
  activeRunner = null;
  showStoryPicker();
});

const backOneBtn = document.getElementById('backOneBtn');
if (backOneBtn) {
  backOneBtn.addEventListener('click', () => {
    if (activeRunner) activeRunner.goBack();
  });
}

const bookmarkBtn = document.getElementById('bookmarkBtn');
if (bookmarkBtn) {
  bookmarkBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (activeRunner) activeRunner.toggleBookmark();
  });
}

bubbleContent.addEventListener('click', (e) => {
  if (e.target.closest('.choice-inline') || 
      e.target.closest('.choice-option') || 
      e.target.closest('.restart') ||
      e.target.closest('.story-card')) return;
  
  if (bubbleContent.classList.contains('advance-ready') && activeRunner) {
    activeRunner.advance();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && bubble.classList.contains('open')) closeBubble();
});

// Modified openBubble — cursor awareness off while bubble is open
const _originalOpenBubble = openBubble;
openBubble = function() {
  cursorAwarenessActive = false;
  _originalOpenBubble();
};

const _originalCloseBubble = closeBubble;
closeBubble = function() {
  _originalCloseBubble();
  setTimeout(() => { cursorAwarenessActive = true; }, 500);
};

startIdleRotation();
setTimeout(() => kitHint.classList.add('visible'), 2000);

</script>
